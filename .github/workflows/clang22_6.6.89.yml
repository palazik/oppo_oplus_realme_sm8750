      - name: Configure SchedUtil Optimizations
        if: inputs.schedutil_opt
        working-directory: kernel_workspace
        run: |
          echo "Applying SchedUtil optimizations..."
          cat >> common/arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
          CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y
          EOF
          # Уменьшаем rate_limit_us для более быстрого отклика
          SU_C="common/kernel/sched/cpufreq_schedutil.c"
          if [ -f "$SU_C" ]; then
            # Меняем дефолтный rate limit с 1000us на 500us
            sed -i 's/LATENCY_MULTIPLIER\s*=\s*1000/LATENCY_MULTIPLIER = 500/' "$SU_C" 2>/dev/null || true
          fi
 
      - name: Patch throne_tracker for true multi-manager
        if: inputs.multi_manager_throne
        working-directory: kernel_workspace
        run: |
          echo "Patching throne_tracker for multi-manager UID support..."
          # throne_tracker.c ищет менеджер по хэшу APK и сохраняет его UID.
          # Патчим: вместо одного ksu_manager_uid — допускаем несколько UID.
          # ОСТОРОЖНО: экспериментальный патч, может вызвать нестабильность.
          
          THRONE=$(find common -name "throne_tracker.c" | head -1)
          [ -z "$THRONE" ] && { echo "throne_tracker.c not found"; exit 0; }
          echo "Found: $THRONE"
 
          python3 << PYEOF
          import re
 
          path = "$THRONE"
          with open(path) as f:
              src = f.read()
 
          if 'ksu_multi_manager' in src:
              print("Already patched"); exit(0)
 
          # Патч 1: увеличиваем глубину поиска в /data/app с 2 до 3
          # Это фикс для устройств с только одним установленным менеджером
          src = src.replace(
              'search_manager("/data/app", 2, &uid_list)',
              'search_manager("/data/app", 3, &uid_list) /* ksu_multi_manager */'
          )
 
          # Патч 2: убираем ограничение "один менеджер" — если нашли несколько
          # валидных APK, принимаем все их UID
          # ksu_set_manager_uid вызывается для каждого найденного — это штатное поведение
          # Но ksu_invalidate_manager_uid сбрасывает при следующем track_throne()
          # Добавляем флаг multi_manager чтобы не сбрасывать при нескольких
          src = re.sub(
              r'(ksu_set_manager_uid\(uid\);)',
              r'/* ksu_multi_manager: accept all valid managers */\n\t\t\1',
              src
          )
 
          with open(path, 'w') as f:
              f.write(src)
          print(f"Patched {path}: multi-manager throne support enabled")
          PYEOF
          
