          cat >> common/arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_TCP_NODELAY_DEFAULT=y
          EOF
          # Патчим tcp.c если конфиг недостаточен
          TCP_C="common/net/ipv4/tcp.c"
          if [ -f "$TCP_C" ] && ! grep -q "TCP_NODELAY_FORCE" "$TCP_C"; then
