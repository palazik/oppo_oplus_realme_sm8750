name: Kernel Build & Notify
on:
  workflow_dispatch:
    inputs:
      fast_test:
        description: 'Fast Test (Skip compilation, test Bot/Telegraph only)'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Нужно для вытягивания истории коммитов в Telegra.ph

      # --- ЭТАП 1: ГЕНЕРАЦИЯ ЗАГЛУШКИ ДЛЯ БЫСТРОГО ТЕСТА ---
      - name: Fast Test Mock
        if: github.event.inputs.fast_test == 'true'
        run: |
          echo "FAST TEST MODE: Creating dummy files..."
          touch AnyKernel3-FastTest-v1.0.zip
          echo "This is a test build" > ak3.log

      # (Тут твои обычные шаги компиляции, добавь в них условие ниже)
      # - name: Build Kernel
      #   if: github.event.inputs.fast_test != 'true'
      #   run: |
      #     ... твои команды сборки ...

      # --- ЭТАП 2: УНИВЕРСАЛЬНЫЕ МЕТАДАННЫЕ ---
      - name: Get Metadata
        id: meta
        run: |
          # Ищем любой .zip, начинающийся на AnyKernel3
          ZIP_FILE=$(ls AnyKernel3-*.zip | head -n 1)
          KERNEL_NAME=$(echo $ZIP_FILE | sed 's/AnyKernel3-//;s/.zip//')
          echo "ZIP_PATH=$ZIP_FILE" >> $GITHUB_ENV
          echo "K_NAME=$KERNEL_NAME" >> $GITHUB_ENV
          echo "DATE=$(date +'%d.%m.%Y %H:%M')" >> $GITHUB_ENV

      # --- ЭТАП 3: TELEGRA.PH (FEATURES) ---
      - name: Create Features Page
        id: telegraph
        run: |
          pip install telegraph
          python <<EOF
          from telegraph import Telegraph
          import os

          telegraph = Telegraph()
          telegraph.create_account(short_name='OnePlus13Builder')

          # Собираем список коммитов для раздела Features
          features = os.popen("git log -n 15 --pretty=format:'<li><b>%s</b> by %an</li>'").read()
          
          # Формируем HTML контент
          html_content = f"""
          <h3>🚀 Build Details</h3>
          <p><b>Kernel Version:</b> {os.environ['K_NAME']}</p>
          <p><b>Build Date:</b> {os.environ['DATE']}</p>
          <hr/>
          <h3>🛠 Features & Changelog</h3>
          <ul>{features}</ul>
          <br/>
          <p><i>Note: This is an automated build for Snapdragon 8 Elite.</i></p>
          """

          response = telegraph.create_page(
              title=f"Changelog: {os.environ['K_NAME']}",
              html_content=html_content,
              author_name="Kernel CI Bot"
          )
          
          with open('t_url.txt', 'w') as f:
              f.write(f"https://telegra.ph/{response['path']}")
          EOF
          echo "T_URL=$(cat t_url.txt)" >> $GITHUB_ENV

      # --- ЭТАП 4: ОТПРАВКА В TELEGRAM ---
      - name: Send to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          document: ${{ env.ZIP_PATH }}
          format: markdown
          message: |
            🚀 *Kernel Build Ready!*

            📱 *Device:* OnePlus 13 (8 Elite)
            🔧 *Kernel:* `${{ env.K_NAME }}`
            📅 *Date:* ${{ env.DATE }}
            🌳 *Branch:* `${{ github.ref_name }}`

            📜 *Detailed Features:*
            [Open Full Changelog](${{ env.T_URL }})

            👤 *Maintainer:* @${{ github.actor }}
