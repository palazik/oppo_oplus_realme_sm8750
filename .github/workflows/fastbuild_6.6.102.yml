          echo "Adding LZ4 & ZSTD patches..."
          cd kernel_workspace
          git clone --depth=1 https://github.com/$GITHUB_REPOSITORY.git -b $GITHUB_REF_NAME $GITHUB_ACTOR || true
          cp ./$GITHUB_ACTOR/zram_patch/001-lz4.patch ./common/ || true
          cp ./$GITHUB_ACTOR/zram_patch/lz4armv8.S ./common/lib || true
          cp ./$GITHUB_ACTOR/zram_patch/002-zstd.patch ./common/ || true
          cd ./common
          git apply -p1 < 001-lz4.patch || true
          patch -p1 < 002-zstd.patch || true

      - name: Apply LZ4KD Patch
        if: inputs.lz4kd_enable
        run: |
          echo "Adding LZ4KD patch..."
          cd kernel_workspace
          if [ ! -d "SukiSU_patch" ]; then
            git clone --depth=1 https://github.com/ShirkNeko/SukiSU_patch.git
          fi
          cd common
          cp -r ../SukiSU_patch/other/zram/lz4k/include/linux/* ./include/linux/
          cp -r ../SukiSU_patch/other/zram/lz4k/lib/* ./lib
          cp -r ../SukiSU_patch/other/zram/lz4k/crypto/* ./crypto
          cp ../SukiSU_patch/other/zram/zram_patch/${{ env.KERNEL_VERSION }}/lz4kd.patch ./
          patch -p1 -F 3 < lz4kd.patch || true
          
      - name: Configure SuSFS
        if: inputs.susfs_enable
