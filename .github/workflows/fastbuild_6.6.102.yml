name: 6.6.102 OP13 OKI Fast Build

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android15'
  KERNEL_VERSION: '6.6'
  SUB_VERSION: '102'
  KERNEL_NAME: 'android15-8-g29d86c5fc9dd-abogki428889875-4k'
  CCACHE_KEY: ccache-neov4-6.6.102

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSU Branch (ReSukiSU / SukiSU Ultra / KernelSU Next / KSU Official / none)'
        required: true
        type: choice
        default: 'ksunext'
        options:
          - 'ksunext'
          - 'ksu'
          - 'sukisu'
          - 'resukisu'
          - 'wildksu'
          - 'none'
      susfs_enable:
        description: 'Enable SuSFS (Enhances hide environment; might slightly increase battery usage)'
        required: true
        type: boolean
        default: true
      kpm_enable:
        description: 'Enable KPM (builtin for (re)sukisu, kpn for independent KPM)'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'
      clang_version:
        description: 'Choose clang version for building kernel'
        required: true
        type: choice
        default: 'clang18'
        options:
          - 'clang22'
          - 'clang18'
      lz4_enable:
        description: 'Install LZ4 1.10.0 + ZSTD 1.5.7 Patch'
        required: true
        type: boolean
        default: true
      lz4kd_enable:
        description: 'Install LZ4KD Patch (ZRAM optimization)'
        required: true
        type: boolean
        default: false
      bbr_enable:
        description: "Enable TCP BBR/Brutal (false=off, true=add, default=set as default)"
        required: true
        type: choice
        default: 'true'
        options:
          - 'false'
          - 'true'
          - 'default'
      adios_enable:
        description: 'Enable ADIOS IO Scheduler (Improves IO read/write performance)'
        required: true
        type: boolean
        default: true
      rekernel_enable:
        description: 'Enable Re-Kernel Support (Enhances app freezing via NoActive/Freezer)'
        required: true
        type: boolean
        default: false
      baseband_guard:
        description: 'Enable Baseband Guard (Anti-brick modem protection)'
        required: true
        type: boolean
        default: true
      ccache_update:
        description: 'Update CCache (Enable if changing source/configs or refreshing cache)'
        required: true
        type: boolean
        default: false
      kernel_suffix:
        description: 'Kernel Suffix (leave empty for default, no spaces/special chars)'
        required: false
        type: string
        default: 'next-palaziks'
      lto_type:
        description: 'LTO Optimization (none = fast compile, thin = default, full = slow)'
        required: true
        type: choice
        default: 'thin'
        options:
          - 'none'
          - 'thin'
          - 'full'
      multi_manager:
        description: 'Enable Multi-Manager support (Allows any KSU manager to control root)'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
          - 'full'
      hmbird_enable:
        description: 'Enable HMBIRD SCX Scheduler (SM8750 perf tweak)'
        required: true
        type: boolean
        default: false
      unicode_fix:
        description: 'Enable Unicode Bypass Fix (path traversal protection)'
        required: true
        type: boolean
        default: true
      zram_writeback:
        description: 'Enable ZRAM Writeback (better memory management)'
        required: true
        type: boolean
        default: false
      schedutil_opt:
        description: 'Enable SchedUtil optimizations (better CPU governor)'
        required: true
        type: boolean
        default: true
      telegram_notify:
        description: 'Send Telegram notification after build'
        required: true
        type: boolean
        default: true
      cpu_opt:
        description: 'CPU Optimizations (Oryon MCPU tuning for SM8750)'
        required: true
        type: boolean
        default: true
      f2fs_opt:
        description: 'F2FS Optimizations (better flash storage performance)'
        required: true
        type: boolean
        default: false
      wireguard:
        description: 'Enable WireGuard VPN support'
        required: true
        type: boolean
        default: false
      netfilter_full:
        description: 'Full Netfilter (conntrack, NAT, hashlimit)'
        required: true
        type: boolean
        default: false
      lrng_enable:
        description: 'Enable LRNG v59 (better entropy for crypto/gaming)'
        required: true
        type: boolean
        default: false
      wakelock_blocker:
        description: 'Enable Wakelock Blocker (better idle battery drain)'
        required: true
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: Install dependencies & Init Source/Clang
        run: |
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace
          echo "Current Repo: $GITHUB_REPOSITORY"
          echo "Current Branch: $GITHUB_REF_NAME"
          
          sudo apt-mark hold firefox &&
          sudo apt-mark hold libc-bin &&
          sudo apt purge man-db &&
          sudo rm -rf /var/lib/man-db/auto-update &&
          sudo apt update &&
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev ccache aria2 &
          
          echo "Cloning source repository..."
          curl -L https://github.com/palazik/OnePlus_Kernel_Backport/archive/refs/heads/6.6.102_oneplus13_coloros16.0.5.zip -o common.zip && 
          unzip -q common.zip && 
          mv OnePlus_Kernel_Backport-* common &&
          rm -rf common.zip &

          # ИСПРАВЛЕНИЕ: Проверяем clang_version
          if [[ ${{ github.event.inputs.clang_version }} == "clang22" ]]; then
            echo "Cloning Official LLVM-Clang 22.1.3..." &&
            mkdir -p clang18 &&
            aria2c -s16 -x16 -k1M https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.3/LLVM-22.1.3-Linux-X64.tar.xz -o clang.tar.xz &&
            tar -xvf clang.tar.xz -C clang18 --strip-components=1 &&
            rm -rf clang.tar.xz &
            
            # ИСПРАВЛЕНИЕ: Качаем нормальные build-tools
            echo "Cloning build tools..." &&
            aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip &&
            unzip -q build-tools.zip &&
            rm -rf build-tools.zip &

          elif [[ ${{ github.event.inputs.clang_version }} == "clang18" ]]; then
            echo "Cloning LLVM-Clang18 toolchain..." &&
            mkdir -p clang18 &&
            aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip &&
            unzip -q clang.zip -d clang18 &&
            rm -rf clang.zip &
            
            echo "Cloning build tools..." &&
            aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip &&
            unzip -q build-tools.zip &&
            rm -rf build-tools.zip &
          fi
          
          wait
          echo "Source and tools initialized successfully!"
          echo "Removing ABI protection & dirty suffix..."
          rm common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done

      - name: Configure CCache Directory
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=3G" >> $GITHUB_ENV
          echo "Current Disk Space:"
          df -h
          echo "Current Build Kernel Version: ${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}"

      - name: Restore CCache
        uses: actions/cache@v4
        id: ccache-restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            ${{ env.CCACHE_KEY }}-${{ runner.os }}-
            ${{ env.CCACHE_KEY }}-

      - name: Pull Public CCache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking local cache status..."
          if [ -d "${{ env.CCACHE_DIR }}" ] && [ "$(ls -A ${{ env.CCACHE_DIR }} 2>/dev/null)" ]; then
            echo "Local cache loaded successfully, skipping public cache pull!"
            exit 0
          fi
          
          echo "Cache miss, attempting to pull public ccache..."
          mkdir -p ${{ env.CCACHE_DIR }}
          FILE_NAME="ccache-${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}.tar.zst"
          
          if gh release download -p "$FILE_NAME" -R cctv18/public_ccache; then
            echo "Successfully downloaded $FILE_NAME, extracting..."
            tar -I zstd -xf "$FILE_NAME" -C ${{ env.CCACHE_DIR }}
            echo "Public ccache restored successfully!"
          else
            echo "Public ccache not found, proceeding with full clean build..."
          fi

      - name: Clear Old CCache
        if: inputs.ccache_update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Clearing old ccache from repository..."
          if gh cache delete ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }} -R ${{ github.repository }}; then
            echo "Successfully deleted old ccache!"
          else
            echo "Old cache does not exist or was already cleared!"
          fi
      
      - name: Init and Config CCache
        run: |
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="${{ env.CCACHE_MAXSIZE }}"
          
          mkdir -p "$CCACHE_DIR"
          
          echo "Configuring CCache size to: $CCACHE_MAXSIZE"
          ccache -M "$CCACHE_MAXSIZE"
          ccache -o compression=true
          
          echo "Initial CCache status:"
          ccache -s
          
          if [ "${{ steps.ccache-restore.outputs.cache-hit }}" == 'true' ]; then
            echo "CCache Hit Details:"
            ccache -sv
          fi

      - name: Setup KernelSU
        id: ksu_version
        run: |
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            echo "Configuring SukiSU Ultra..."
            curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin
            cd ./KernelSU
            GIT_COMMIT_HASH=$(git rev-parse --short=8 HEAD)
            echo "Current Commit Hash: $GIT_COMMIT_HASH"
            export KSU_VERSION=$KSU_VERSION
            for i in {1..3}; do
              KSU_API_VERSION=$(curl -s "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/builtin/kernel/Makefile" | 
                grep -m1 "KSU_VERSION_API :=" | 
                awk -F'= ' '{print $2}' | 
                tr -d '[:space:]')
              [ -n "$KSU_API_VERSION" ] && break || sleep 1
            done
            [ -z "$KSU_API_VERSION" ] && KSU_API_VERSION="3.1.7"
            echo "KSU_API_VERSION=$KSU_API_VERSION" >> $GITHUB_ENV
            VERSION_DEFINITIONS=$'define get_ksu_version_full\nv\\$1-'"$GIT_COMMIT_HASH"$'@cctv18\nendef\n\nKSU_VERSION_API := '"$KSU_API_VERSION"$'\nKSU_VERSION_FULL := v'"$KSU_API_VERSION"$'-'"$GIT_COMMIT_HASH"$'@cctv18'
            sed -i '/define get_ksu_version_full/,/endef/d' kernel/Makefile
            sed -i '/KSU_VERSION_API :=/d' kernel/Makefile
            sed -i '/KSU_VERSION_FULL :=/d' kernel/Makefile
            awk -v def="$VERSION_DEFINITIONS" '
              /REPO_OWNER :=/ {print; print def; inserted=1; next}
              1
              END {if (!inserted) print def}
            ' kernel/Makefile > kernel/Makefile.tmp && mv kernel/Makefile.tmp kernel/Makefile

            KSU_VERSION=$(expr $(git rev-list --count main) + 37185 2>/dev/null || echo 114514)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT

            grep -A10 "REPO_OWNER" kernel/Makefile
            grep "KSU_VERSION_FULL" kernel/Makefile
            echo "SukiSU Version: v${KSU_API_VERSION}-${GIT_COMMIT_HASH}@cctv18"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            echo "Configuring ReSukiSU..."
            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
            echo 'CONFIG_KSU_FULL_NAME_FORMAT="%TAG_NAME%-%COMMIT_SHA%@cctv18"' >> ./common/arch/arm64/configs/gki_defconfig
            cd ./KernelSU
            KSU_VERSION=$(expr $(git rev-list --count main) + 30700 2>/dev/null || echo 114514)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            echo "Configuring KernelSU Next (Official Stock Branch)..."
            curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/legacy/kernel/setup.sh" | bash -s legacy
            cd KernelSU-Next
            # Версия = количество коммитов в legacy ветке + 10200 (оффсет KSU-Next)
            KSU_VERSION=$(($(git rev-list --count HEAD) + 30000))
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/KSU_VERSION_FALLBACK := 1/KSU_VERSION_FALLBACK := $KSU_VERSION/g" kernel/Kbuild
            KSU_GIT_TAG=$(git describe --abbrev=0 --tags 2>/dev/null || echo "v1.0.0")
            sed -i "s/KSU_VERSION_TAG_FALLBACK := v0.0.1/KSU_VERSION_TAG_FALLBACK := $KSU_GIT_TAG/g" kernel/Kbuild
            rm -rf .git
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            echo "Configuring Official KernelSU..."
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/refs/heads/main/kernel/setup.sh" | bash -s main
            cd ./KernelSU
            KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/tiann/KernelSU/commits?sha=main&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 30000)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Kbuild
          elif [[ ${{ github.event.inputs.ksu_type }} == "wildksu" ]]; then
            echo "Configuring WildKSU..."
            # Fetch from the WildKernels repository
            curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/refs/heads/stable/kernel/setup.sh" | bash -s stable
            
            # setup.sh usually clones into a folder named Wild_KSU or KernelSU
            if [ -d "Wild_KSU" ]; then cd Wild_KSU; else cd KernelSU; fi
            
            # Calculate the version (commits + 30000 offset for modern managers)
            LATEST_COMMITS=$(git rev-list --count HEAD)
            KSU_VERSION=$(($LATEST_COMMITS + 30000))
            
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            
            # WildKSU is a fork of KSU-Next, so it uses the same Kbuild variable names
            sed -i "s/KSU_VERSION_FALLBACK := 1/KSU_VERSION_FALLBACK := $KSU_VERSION/g" \
              kernel/Kbuild 2>/dev/null || true
            KSU_GIT_TAG=$(git describe --abbrev=0 --tags 2>/dev/null || echo "v1.0.0")
            sed -i "s/KSU_VERSION_TAG_FALLBACK := v0.0.1/KSU_VERSION_TAG_FALLBACK := $KSU_GIT_TAG/g" \
              kernel/Kbuild 2>/dev/null || true
            rm -rf .git
          else
            echo "No built-in KernelSU selected, skipping..."
          fi

      - name: Fix ksu selinux linker errors
        working-directory: kernel_workspace/common
        run: |
          # Ищем rules.c в двух возможных местах
          RULES_C=""
          for p in \
            "../KernelSU-Next/kernel/selinux/rules.c" \
            "drivers/kernelsu/selinux/rules.c"; do
            [ -f "$p" ] && { RULES_C="$p"; break; }
          done
          [ -z "$RULES_C" ] && { echo "rules.c not found, skip"; exit 0; }
          echo "Found: $RULES_C"

          # Если предыдущий (сломанный) патч уже применён — убираем его
          if grep -q "KSU 6.6 LINKER FIX\|ksu_kallsyms_lookup_name\|ksu_dup_sepolicy(void \*pol)" "$RULES_C"; then
            echo "Removing broken V3 patch..."
            python3 - "$RULES_C" << 'PYEOF'
          import re, sys
          path = sys.argv[1]
          with open(path) as f:
              src = f.read()
          src = re.sub(
              r'void \*ksu_dup_sepolicy\(void \*pol\);\nvoid ksu_destroy_sepolicy\(void \*pol\);\n',
              '', src
          )
          src = re.sub(
              r'/\* --- KSU 6\.6 LINKER FIX.*?#endif\n',
              '', src, flags=re.DOTALL
          )
          with open(path, 'w') as f:
              f.write(src)
          print("Removed broken patch")
          PYEOF
          fi

          # ПРАВИЛЬНЫЙ ФИКС: Удаляем макрос и обновляем имена структур для ядра 6.6
          if grep -q "#define SELINUX_POLICY_INSTEAD_SELINUX_SS" "$RULES_C"; then
            # 1. Удаляем макрос, чтобы форсировать путь #else (stop_machine)
            sed -i '/#define SELINUX_POLICY_INSTEAD_SELINUX_SS/d' "$RULES_C"
            
            # 2. Исправляем старую структуру для совместимости с ядром 6.6
            sed -i 's/struct selinux_ss \*ss = selinux_state.ss;/struct selinux_policy \*ss = selinux_state.policy;/g' "$RULES_C"
            
            # 3. Заглушаем rwlock, чтобы он вернул NULL и корректно триггерил stop_machine
            sed -i 's/return &selinux_state.ss->policy_rwlock;/return NULL;/g' "$RULES_C"
            
            echo "Applied: forced stop_machine SELinux path for Linux 6.6"
          else
            echo "Already patched"
          fi

      - name: Apply Multi-Manager (apksigner dynamic hashes)
        if: inputs.multi_manager != 'false'
        run: |
          sudo apt-get install -y --no-install-recommends apksigner 2>/dev/null
          mkdir -p /tmp/manager_apks

          dl_apk() {
            local REPO="$1" PAT="$2" OUT="$3"
            local URL
            URL=$(curl -sL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${REPO}/releases" | \
              python3 -c "
          import sys,json,re
          data=json.load(sys.stdin)
          p=re.compile(r'${PAT}',re.I)
          for rel in (data if isinstance(data,list) else [data]):
              u=[a['browser_download_url'] for a in rel.get('assets',[]) if p.search(a['name'])]
              if u: print(u[0]); break
              " 2>/dev/null)
            [ -n "$URL" ] && wget -qO "$OUT" "$URL" && echo "  OK: $OUT ($REPO)" \
              || echo "  WARN: no match in $REPO"
          }

          echo "==> Downloading APKs..."
          dl_apk "tiann/KernelSU"             '\.apk$'               /tmp/manager_apks/ksu.apk
          dl_apk "KernelSU-Next/KernelSU-Next" '^(?!.*spoof).*\.apk$' /tmp/manager_apks/ksunext.apk
          dl_apk "KernelSU-Next/KernelSU-Next" 'spoof.*\.apk$'        /tmp/manager_apks/ksunext_spoof.apk
          dl_apk "SukiSU-Ultra/SukiSU-Ultra"   '\.apk' /tmp/manager_apks/sukisu.apk
          dl_apk "WildKernels/Wild_KSU" '^(?!.*Spoof).*\.apk$' /tmp/manager_apks/wildksu.apk
          dl_apk "WildKernels/Wild_KSU" 'Spoof.*\.apk$'        /tmp/manager_apks/wildksu_spoof.apk

          ls -lh /tmp/manager_apks/

          # Получаем size (из APK signing block) + sha256 (от apksigner)
          python3 << 'PYEOF'
          import os, subprocess, re, sys, struct, hashlib

          APK_DIR = '/tmp/manager_apks'

          def get_cert_size_from_apk(path):
            with open(path, 'rb') as f:
                data = bytearray(f.read())
            
            eocd_offset = None
            for i in range(0, 0x10000):
                if len(data) < i + 2:
                    break
                n = struct.unpack_from('<H', data, len(data) - i - 2)[0]
                if n == i:
                    pos = len(data) - i - 22
                    if pos < 0:
                        continue
                    sig = struct.unpack_from('<I', data, pos)[0]
                    if (sig ^ 0xcafebabe) == 0xccfbf1ee:
                        eocd_offset = pos
                        break
            
            if eocd_offset is None:
                return None
            
            cd_offset = struct.unpack_from('<I', data, eocd_offset + 16)[0]
            if cd_offset < 24:
                return None
            
            magic_pos = cd_offset - 16
            magic = data[magic_pos:magic_pos + 16]
            if magic != b'APK Sig Block 42':
                return None
            
            size_of_block = struct.unpack_from('<Q', data, cd_offset - 24)[0]
            pairs_start = cd_offset - size_of_block - 8
            pairs_end   = cd_offset - 24
            
            pos = pairs_start
            while pos < pairs_end:
                if pos + 12 > len(data):
                    break
                pair_sz = struct.unpack_from('<Q', data, pos)[0]
                pair_id = struct.unpack_from('<I', data, pos + 8)[0]
                if pair_sz < 4 or pos + 8 + pair_sz > pairs_end + 8:
                    break
                val = data[pos + 12 : pos + 8 + pair_sz]
                pos = pos + 8 + pair_sz
                
                if pair_id != 0x7109871a:
                    continue
                
                p = 0
                try:
                    p += 4  # signer-sequence length
                    p += 4  # signer length
                    p += 4  # signed data length
                    dig_len = struct.unpack_from('<I', val, p)[0]; p += 4
                    p += dig_len  # skip digests
                    p += 4        # certificates length
                    cert_len = struct.unpack_from('<I', val, p)[0]
                    return cert_len
                except struct.error:
                    continue
            return None

          entries = []
          seen_hashes = set()

          for fname in sorted(os.listdir(APK_DIR)):
              if not fname.endswith('.apk'):
                  continue
              fpath = os.path.join(APK_DIR, fname)
              if os.path.getsize(fpath) < 1000:
                  print(f"  SKIP {fname}: too small")
                  continue

              try:
                  out = subprocess.check_output(
                      ['apksigner', 'verify', '--print-certs', fpath],
                      stderr=subprocess.STDOUT, text=True)
                  m = re.search(r'Signer #1 certificate SHA-256 digest:\s*([0-9a-fA-F]{64})', out)
                  if not m:
                      print(f"  SKIP {fname}: no SHA-256 from apksigner")
                      continue
                  sha256 = m.group(1).lower()
              except Exception as e:
                  print(f"  SKIP {fname}: apksigner error: {e}")
                  continue

              cert_size = get_cert_size_from_apk(fpath)
              if cert_size is None:
                  print(f"  SKIP {fname}: cannot parse cert size")
                  continue

              if sha256 in seen_hashes:
                  print(f"  DUP  {fname}: same cert as existing entry")
                  continue
              seen_hashes.add(sha256)

              print(f"  OK   {fname}: size=0x{cert_size:x}  sha256={sha256}")
              entries.append((fname, cert_size, sha256))

          if not entries:
              print("ERROR: no entries!"); sys.exit(1)

          lines = ['bool is_manager_apk(char *path)', '{']
          for name, size, h in entries:
              lines.append(f'    /* {name} */')
              lines.append(f'    if (check_v2_signature(path, 0x{size:x}u, "{h}")) return true;')
          lines.append('    return false;')
          lines.append('}')
          new_func = '\n'.join(lines)

          with open('/tmp/mm_func.c', 'w') as f:
              f.write(new_func)
          print(f"\nGenerated is_manager_apk() with {len(entries)} managers")
          PYEOF

          [ -s /tmp/mm_func.c ] || { echo "ERROR: mm_func.c empty"; exit 1; }
          echo "==> Generated function:"
          cat /tmp/mm_func.c

          APK_SIGN=$(find kernel_workspace -name "apk_sign.c" | head -1)
          [ -z "$APK_SIGN" ] && { echo "apk_sign.c not found"; exit 0; }
          echo "==> Patching: $APK_SIGN"

          python3 - "$APK_SIGN" << 'PYEOF2'
          import re, sys

          path = sys.argv[1]
          with open(path) as f:
              src = f.read()

          with open('/tmp/mm_func.c') as f:
              new_func = f.read()

          src = src.replace(
              'if (v3_signing_exist || v3_1_signing_exist)',
              'if (0 /* mm: skip v3 check */)'
          )
          src = src.replace(
              'if (v2_signing_blocks != 1)',
              'if (0 /* mm: skip blocks check */)'
          )

          pat = re.compile(
              r'bool\s+is_manager_apk\s*\(\s*char\s*\*\s*path\s*\)\s*\{.*?\n\}',
              re.DOTALL
          )
          m = pat.search(src)
          if not m:
              print("ERROR: is_manager_apk() not found!")
              sys.exit(1)

          src = src[:m.start()] + new_func + src[m.end():]

          with open(path, 'w') as f:
              f.write(src)

          print(f"Done: {path}")
          PYEOF2

          # -- Экспериментальный блок --
          if [ "${{ github.event.inputs.multi_manager }}" = "full" ]; then
            echo "==> Applying experimental throne_tracker patch..."
            THRONE=$(find kernel_workspace -name "throne_tracker.c" | head -1)
            [ -z "$THRONE" ] && { echo "throne_tracker.c not found"; exit 0; }
            
            python3 << 'PYEOF3'
          import re, sys
          path = sys.argv[1]
          with open(path) as f:
              src = f.read()

          if 'ksu_multi_manager' in src:
              print("Already patched"); sys.exit(0)

          src = src.replace(
              'search_manager("/data/app", 2, &uid_list)',
              'search_manager("/data/app", 3, &uid_list) /* ksu_multi_manager */'
          )
          src = re.sub(
              r'(ksu_set_manager_uid\(uid\);)',
              r'/* ksu_multi_manager: accept all valid managers */\n\t\t\1',
              src
          )
          with open(path, 'w') as f:
              f.write(src)
          print(f"Patched {path}: multi-manager throne support enabled")
          PYEOF3
          fi

      - name: Apply SuSFS Patches
        if: inputs.susfs_enable
        run: |
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} != "none" ]]; then
            echo "Adding SuSFS patches..."
            git clone --depth=1 https://github.com/cctv18/susfs4oki.git susfs4ksu -b oki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/other_patch/69_hide_stuff.patch -O ./common/69_hide_stuff.patch || touch ./common/69_hide_stuff.patch
            cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch ./common/
            cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
            cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
            cd ./common
            patch -p1 < 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || true
            patch -p1 -N -F 3 < 69_hide_stuff.patch || true
            cd ..
          else
            echo "No built-in KSU selected, skipping SuSFS..."
          fi
          if [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            echo "Adding SuSFS patch for Official KernelSU..."
            cp ./susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU/
            cd ./KernelSU
            patch -p1 < 10_enable_susfs_for_ksu.patch || true
          fi
          
      - name: Apply LZ4 1.10.0 & ZSTD 1.5.7 Patches
        if: inputs.lz4_enable
