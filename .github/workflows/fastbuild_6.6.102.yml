          fi
          # --- ДЕЛАЕМ ДРАЙВЕР ДИСПЛЕЯ ВСТРОЕННЫМ (BUILT-IN) ---
          echo "CONFIG_DRM=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_DRM_MSM=y" >> ./common/arch/arm64/configs/gki_defconfig
          # ----------------------------------------------------
          echo "CONFIG_TMPFS_XATTR=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> ./common/arch/arm64/configs/gki_defconfig
          if [[ "${{ github.event.inputs.lz4kd_enable }}" == "true" ]]; then
            echo "CONFIG_ZSMALLOC=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_CRYPTO_LZ4HC=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_CRYPTO_LZ4K=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_CRYPTO_LZ4KD=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_CRYPTO_842=y" >> ./common/arch/arm64/configs/gki_defconfig
          fi
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> ./common/arch/arm64/configs/gki_defconfig
          sed -i 's/check_defconfig//' ./common/build.config.gki
          echo "CONFIG_HEADERS_INSTALL=n" >> ./common/arch/arm64/configs/gki_defconfig

      - name: Configure HMBIRD SCX Scheduler
        if: inputs.hmbird_enable
        working-directory: kernel_workspace/common
        run: |
          echo "Enabling HMBIRD SCX (SM8750 scheduler extension)..."
          # HMBIRD патчи от TheWildJames / Numbersf
          git clone --depth=1 https://github.com/Numbersf/SCHED_PATCH.git /tmp/hmbird_patch || true
          if [ -d /tmp/hmbird_patch ]; then
            # Применяем патч overwriter если есть
            for p in /tmp/hmbird_patch/*.patch; do
              [ -f "$p" ] && patch -p1 -F 3 < "$p" || true
            done
          fi
          # Конфиги для HMBIRD
          cat >> arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_SCHED_CLASS_EXT=y
          CONFIG_OPLUS_FEATURE_HMBIRD_BOOST=y
          CONFIG_OPLUS_FEATURE_HMBIRD_SCHED=y
          EOF
 
      - name: Apply Unicode Bypass Fix
        if: inputs.unicode_fix
        working-directory: kernel_workspace/common
        run: |
          echo "Applying Unicode Bypass Fix..."
          # Патч предотвращает path traversal через non-printable unicode codepoints
          cat > /tmp/unicode_fix.patch << 'PATCH'
          --- a/fs/namei.c
          +++ b/fs/namei.c
          PATCH
          # Используем патч от TheWildJames если есть в репо
          PATCH_URL="https://github.com/TheWildJames/kernel_patches/raw/main/common/unicode_bypass_fix_6.1+.patch"
          wget -qO /tmp/ub_fix.patch "$PATCH_URL" 2>/dev/null && \
            patch -p1 --forward < /tmp/ub_fix.patch || true
          echo "Unicode fix applied (or already present)"
 
      - name: Configure ZRAM Writeback
        if: inputs.zram_writeback
        working-directory: kernel_workspace
        run: |
          echo "Enabling ZRAM Writeback support..."
          cat >> common/arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_ZRAM_WRITEBACK=y
          CONFIG_ZRAM_MEMORY_TRACKING=y
          EOF
 
      - name: Configure SchedUtil Optimizations
        if: inputs.schedutil_opt
        working-directory: kernel_workspace
        run: |
          echo "Applying SchedUtil optimizations..."
          cat >> common/arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
          CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y
          EOF
          # Уменьшаем rate_limit_us для более быстрого отклика
          SU_C="common/kernel/sched/cpufreq_schedutil.c"
          if [ -f "$SU_C" ]; then
            # Меняем дефолтный rate limit с 1000us на 500us
            sed -i 's/LATENCY_MULTIPLIER\s*=\s*1000/LATENCY_MULTIPLIER = 1000/' "$SU_C" 2>/dev/null || true
          fi

      - name: CPU Optimizations (Oryon SM8750)
        if: inputs.cpu_opt
        working-directory: kernel_workspace/common
        run: |
          echo "Applying Oryon CPU optimizations for SM8750..."
          # Oryon MCPU tuning — специфично для Snapdragon 8 Elite
          cat >> arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_ARM64_ERRATUM_2658417=y
          CONFIG_ARCH_QCOM=y
          CONFIG_HZ_300=y
          CONFIG_PREEMPT=y
          CONFIG_NO_HZ_IDLE=y
          EOF
          # Добавляем -mcpu=oryon если поддерживается компилятором
          if ${{ github.event.inputs.clang_version == 'clang22' }} || \
             [ "${{ github.event.inputs.clang_version }}" = "clang22" ]; then
            echo "Adding Oryon MCPU flag for clang22..."
            # Патчим Makefile чтобы добавить -mcpu=oryon для arm64
            ARCH_MK="arch/arm64/Makefile"
            if [ -f "$ARCH_MK" ] && ! grep -q "mcpu=oryon" "$ARCH_MK"; then
              sed -i '/^KBUILD_CFLAGS/a KBUILD_CFLAGS += -mcpu=oryon' "$ARCH_MK" 2>/dev/null || true
            fi
          fi

