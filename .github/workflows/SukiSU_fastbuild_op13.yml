              headers={"Content-Type": "application/json"},
              method="POST"
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  result = json.load(r)
                  print("Telegram:", "OK" if result.get("ok") else f"ERROR: {result.get('description')}")
          except Exception as e:
              print(f"Telegram exception: {e}")
          PYEOF

          # ── Upload ZIP ────────────────────────────────────────────────────
          if [ "$BUILD_STATUS" = "success" ]; then
            ZIP_FILE=$(find "${{ github.workspace }}/kernel_workspace" -name "AnyKernel3*.zip" | head -1)
            if [ -n "$ZIP_FILE" ] && [ -f "$ZIP_FILE" ]; then
              ZIP_SIZE=$(du -sh "$ZIP_FILE" | cut -f1)
              ZIP_NAME=$(basename "$ZIP_FILE")
              echo "Uploading: $ZIP_NAME ($ZIP_SIZE)"
              CAPTION=$(printf "📦 %s\n📏 %s\n🔢 Build #%s\n⚙️ %s · LTO:%s" \
                "$ZIP_NAME" "$ZIP_SIZE" "$BUILD_NUM" "$KSU_DISPLAY v$KSUVER" "$LTO")
              curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument" \
                -F "chat_id=${TELEGRAM_CHAT_ID}" \
                -F "document=@${ZIP_FILE}" \
                -F "caption=${CAPTION}" \
                | python3 -c "
          import json,sys
          r=json.load(sys.stdin)
          print('ZIP upload: OK' if r.get('ok') else f'ZIP upload ERROR: {r.get(\"description\")}')
          " || echo "ZIP upload failed (size limit?)"
            fi
          fi

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read
      
    steps:
      - name: Download ZIP Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.ak3name }}
          path: ./release_zips

      - name: Set Environment Variables
        run: |
          FULL_VERSION=${{ github.event.inputs.kernel_version }}-palaziks-ShiftPorts
          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
          export FULL_VERSION=$FULL_VERSION
          TIME="$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "TIME=$TIME" >> $GITHUB_ENV
          echo "TIME_FORM=$TIME_FORM" >> $GITHUB_ENV
          TAG_HEAD="OPPO-OPlus-Realme-build"
          echo "TAG_HEAD=$TAG_HEAD" >> $GITHUB_ENV
          KSU_TYPENAME="SukiSU Ultra"
          echo "KSU_TYPENAME=$KSU_TYPENAME" >> $GITHUB_ENV
          
      - name: Create Release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > release_notes.md
          ### 📱 OnePlus 13 SukiSU Ultra SM8750 Generic Kernel | Build Info
          - **Kernel Version:** ${{ env.FULL_VERSION }}
          - **Build Time:** ${{ env.TIME_FORM }}
          - **Device:** Snapdragon 8 Elite Generic ${{ github.event.inputs.kernel_version }} Kernel (Based on OnePlus 13 ${{ github.event.inputs.kernel_version }} Official OKI source)
          - **KSU Branch:** SukiSU Ultra
          - **SuSFS Support:** ${{ github.event.inputs.SUSFS }}
          - **KPM Support:** ${{ github.event.inputs.kpm_enable }}
          - **LZ4 Support:** ${{ github.event.inputs.lz4_enable }}
          - **LZ4KD Support:** ${{ github.event.inputs.lz4kd_enable }}
          - **BBR/Brutal TCP Algorithms:** ${{ github.event.inputs.bbr_enable }}
          - **ADIOS IO Scheduler:** ${{ github.event.inputs.adios_enable }}
          - **Re-Kernel Support:** ${{ github.event.inputs.rekernel_enable }}
          - **Baseband Guard Support:** ${{ github.event.inputs.baseband_guard }}
          - **HMBIRD SCX Scheduler:** ${{ github.event.inputs.hmbird_enable }}
          - **Unicode Bypass Fix:** ${{ github.event.inputs.unicode_fix }}
          - **ZRAM Writeback:** ${{ github.event.inputs.zram_writeback }}
          - **SchedUtil Optimizations:** ${{ github.event.inputs.schedutil_opt }}
          - **Oryon CPU Optimizations:** ${{ github.event.inputs.cpu_opt }}
          - **F2FS Optimizations:** ${{ github.event.inputs.f2fs_opt }}
          - **WireGuard VPN:** ${{ github.event.inputs.wireguard }}
          - **LRNG v59:** ${{ github.event.inputs.lrng_enable }}
          - **Wakelock Blocker:** ${{ github.event.inputs.wakelock_blocker }}
          
          - ReSukiSU管理器下载：[ReSukiSU_CI](https://github.com/cctv18/ReSukiSU_CI/releases)
          - SukiSU Ultra管理器下载：[SukiSU-Ultra](https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases)
          - KernelSU Next管理器下载：[KernelSU-Next](https://github.com/KernelSU-Next/KernelSU-Next/releases)
          - KSU原版管理器下载：[KernelSU](https://github.com/tiann/KernelSU/releases)
          - WildKSU管理器下载: [WildKSU](https://github.com/WildKernels/Wild_KSU/releases)
          
          ### ⏫️ Update Notes:
          - Updated ${{ env.KSU_TYPENAME }} to the latest version (${{ needs.build.outputs.ksuver }})
          
          ### 📋 Installation Guide
          1. If you have a custom recovery (like TWRP) installed, you can flash the AnyKernel zip in recovery mode and reboot.
          2. If your phone is already rooted, you can install [HorizonKernelFlasher](https://github.com/libxzr/HorizonKernelFlasher/releases) and flash the AnyKernel zip through the app.
          3. If you have previously flashed a SukiSU Ultra kernel, you can flash the AnyKernel zip directly in the KSU Manager app.
          4. If you are flashing a kernel *without* the LZ4KD patch over a kernel that *has* it, please disable your ZRAM module first to avoid errors.
          5. Modern KSU managers require a metamodule to mount modules properly. Recommended metamodules include: [meta overlayfs](https://github.com/KernelSU-Modules-Repo/meta-overlayfs), [mountify](https://github.com/backslashxx/mountify), or [meta magicmount](https://github.com/7a72/meta-magic_mount/). If you are upgrading or using KSU for the first time, install one of these first.
          6. KernelPatch Next (KPN) is an independent KPM implementation. Do not use it if your kernel already has built-in KPM enabled.
          
          #### ※※※ Flashing custom kernels has risks. To prevent soft-bricks, always backup your boot/init_boot partitions using apps like [KernelFlasher](https://github.com/capntrips/KernelFlasher) before flashing! ※※※
          EOF

          gh release create "${{ env.TAG_HEAD }}-${{ env.TIME }}" \
            --repo "${{ github.repository }}" \
            --title "${{ env.TAG_HEAD }}-${{ env.FULL_VERSION }}" \
            --notes-file release_notes.md \
            release_zips/AnyKernel3_*.zip
