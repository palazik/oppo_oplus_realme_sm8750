name: SukiSU Ultra OP13 Build

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android15'
  KERNEL_VERSION: '6.6'
  KERNEL_NAME: 'android15-8-g29d86c5fc9dd-abogki428889875-4k'
  CCACHE_KEY: ccache-neov4-${{ github.event.inputs.kernel_version }}

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Choose kernel version to build'
        required: true
        type: choice
        default: '6.6.89'
        options:
          - '6.6.89'
          - '6.6.100'
          - '6.6.102'
          - '6.6.111'
      SUSFS:
        description: 'Enable SuSFS (Enhances hide environment)'
        required: true
        type: boolean
        default: true
      susfs_mode:
        description: "SUSFS source (recommended: sukisu; external applies susfs4oki patch)"
        type: choice
        required: true
        default: external
        options: [sukisu, external]
      kpm_enable:
        description: 'Enable KPM (builtin for (re)sukisu, kpn for independent KPM)'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'
      clang_version:
        description: 'Choose clang version for building kernel'
        required: true
        type: choice
        default: 'clang19'
        options:
          - 'clang19'
          - 'clang18'
      lz4_enable:
        description: 'Install LZ4 1.10.0 + ZSTD 1.5.7 Patch'
        required: true
        type: boolean
        default: true
      lz4kd_enable:
        description: 'Install LZ4KD Patch (ZRAM optimization)'
        required: true
        type: boolean
        default: false
      bbr_enable:
        description: "Enable TCP BBR/Brutal (false=off, true=add, default=set as default)"
        required: true
        type: choice
        default: 'true'
        options:
          - 'false'
          - 'true'
          - 'default'
      adios_enable:
        description: 'Enable ADIOS IO Scheduler (Improves IO read/write performance)'
        required: true
        type: boolean
        default: true
      rekernel_enable:
        description: 'Enable Re-Kernel Support (Enhances app freezing via NoActive/Freezer)'
        required: true
        type: boolean
        default: false
      baseband_guard:
        description: 'Enable Baseband Guard (Anti-brick modem protection)'
        required: true
        type: boolean
        default: true
      ccache_update:
        description: 'Update CCache (Enable if changing source/configs or refreshing cache)'
        required: true
        type: boolean
        default: false
      lto_type:
        description: 'LTO Optimization (none = fast compile, thin = default, full = slow)'
        required: true
        type: choice
        default: 'thin'
        options:
          - 'none'
          - 'thin'
          - 'full'
      hmbird_enable:
        description: 'Enable HMBIRD SCX Scheduler (SM8750 perf tweak)'
        required: true
        type: boolean
        default: false
      unicode_fix:
        description: 'Enable Unicode Bypass Fix (path traversal protection)'
        required: true
        type: boolean
        default: true
      zram_writeback:
        description: 'Enable ZRAM Writeback (better memory management)'
        required: true
        type: boolean
        default: false
      schedutil_opt:
        description: 'Enable SchedUtil optimizations (better CPU governor)'
        required: true
        type: boolean
        default: true
      telegram_notify:
        description: 'Send Telegram notification after build'
        required: true
        type: boolean
        default: true
      cpu_opt:
        description: 'CPU Optimizations (Oryon MCPU tuning for SM8750)'
        required: true
        type: boolean
        default: true
      f2fs_opt:
        description: 'F2FS Optimizations (better flash storage performance)'
        required: true
        type: boolean
        default: false
      wireguard:
        description: 'Enable WireGuard VPN support'
        required: true
        type: boolean
        default: false
      netfilter_full:
        description: 'Full Netfilter (conntrack, NAT, hashlimit)'
        required: true
        type: boolean
        default: false
      lrng_enable:
        description: 'Enable LRNG v59 (better entropy for crypto/gaming)'
        required: true
        type: boolean
        default: false
      wakelock_blocker:
        description: 'Enable Wakelock Blocker (better idle battery drain)'
        required: true
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: Install dependencies & Init Source/Clang
        run: |
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace
          echo "Current Repo: $GITHUB_REPOSITORY"
          echo "Current Branch: $GITHUB_REF_NAME"
          
          sudo apt-mark hold firefox &&
          sudo apt-mark hold libc-bin &&
          sudo apt purge man-db &&
          sudo rm -rf /var/lib/man-db/auto-update &&
          sudo apt update &&
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev ccache aria2 &

          if [[ ${{ github.event.inputs.kernel_version }} == "6.6.89" ]]; then
            echo "Cloning source repository..."
            curl -L https://github.com/cctv18/android_kernel_common_oneplus_sm8750/archive/refs/heads/oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89.zip -o common.zip && 
            unzip -q common.zip && 
            mv "android_kernel_common_oneplus_sm8750-oneplus-sm8750_v_16.0.0_oneplus_13_6.6.89" common &&
            rm -rf common.zip &

          elif [[ ${{ github.event.inputs.kernel_version }} == "6.6.100" ]]; then
            echo "Cloning source repository..."
            curl -L https://github.com/palazik/OnePlus_Kernel_Backport/archive/refs/heads/6.6.100_oneplus13_coloros16.0.5.zip -o common.zip && 
            unzip -q common.zip && 
            mv OnePlus_Kernel_Backport-* common &&
            rm -rf common.zip &

          elif [[ ${{ github.event.inputs.kernel_version }} == "6.6.102" ]]; then
            echo "Cloning source repository..."
            curl -L https://github.com/palazik/OnePlus_Kernel_Backport/archive/refs/heads/6.6.102_oneplus13_coloros16.0.5.zip -o common.zip && 
            unzip -q common.zip && 
            mv OnePlus_Kernel_Backport-* common &&
            rm -rf common.zip &

          elif [[ ${{ github.event.inputs.kernel_version }} == "6.6.111" ]]; then
            echo "Cloning source repository..."
            curl -L https://github.com/palazik/OnePlus_Kernel_Backport/archive/refs/heads/6.6.111_oneplus13_coloros16.0.5.zip -o common.zip && 
            unzip -q common.zip && 
            mv OnePlus_Kernel_Backport-* common &&
            rm -rf common.zip &
          fi

          # Checking clang_version
          # Using Google's newest Clang (r584948)
          if [[ ${{ github.event.inputs.clang_version }} == "clang19" ]]; then
            echo "Fetching Clang 19..."
            mkdir -p clang18 &&
            curl -L "https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip" -o clang.zip &&
            unzip -q clang.zip -d clang18 &&
            rm -rf clang.zip &

            # Match it with Official Google Build Tools for 6.6 GKI
            echo "Fetching matching Google Build Tools..." &&
            curl -L "https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/build-tools.zip" -o build-tools.zip &&
            unzip -q build-tools &&
            rm -rf build-tools.zip &

          elif [[ ${{ github.event.inputs.clang_version }} == "clang18" ]]; then
            echo "Cloning LLVM-Clang18 toolchain..." &&
            mkdir -p clang18 &&
            aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip &&
            unzip -q clang.zip -d clang18 &&
            rm -rf clang.zip &
            
            echo "Cloning build tools..." &&
            aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip &&
            unzip -q build-tools.zip &&
            rm -rf build-tools.zip &
          fi
          
          wait
          echo "Source and tools initialized successfully!"
          echo "Removing ABI protection & dirty suffix..."
          rm common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done

      - name: Configure CCache Directory
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_${{ github.event.inputs.kernel_version }}" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=3G" >> $GITHUB_ENV
          echo "Current Disk Space:"
          df -h
          echo "Current Build Kernel Version: ${{ github.event.inputs.kernel_version }}"

      - name: Restore CCache
        uses: actions/cache@v4
        id: ccache-restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            ${{ env.CCACHE_KEY }}-${{ runner.os }}-
            ${{ env.CCACHE_KEY }}-

      - name: Pull Public CCache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking local cache status..."
          if [ -d "${{ env.CCACHE_DIR }}" ] && [ "$(ls -A ${{ env.CCACHE_DIR }} 2>/dev/null)" ]; then
            echo "Local cache loaded successfully, skipping public cache pull!"
            exit 0
          fi
          
          echo "Cache miss, attempting to pull public ccache..."
          mkdir -p ${{ env.CCACHE_DIR }}
          FILE_NAME="ccache-${{ github.event.inputs.kernel_version }}.tar.zst"
          
          if gh release download -p "$FILE_NAME" -R cctv18/public_ccache; then
            echo "Successfully downloaded $FILE_NAME, extracting..."
            tar -I zstd -xf "$FILE_NAME" -C ${{ env.CCACHE_DIR }}
            echo "Public ccache restored successfully!"
          else
            echo "Public ccache not found, proceeding with full clean build..."
          fi

      - name: Clear Old CCache
        if: inputs.ccache_update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Clearing old ccache from repository..."
          if gh cache delete ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }} -R ${{ github.repository }}; then
            echo "Successfully deleted old ccache!"
          else
            echo "Old cache does not exist or was already cleared!"
          fi
      
      - name: Init and Config CCache
        run: |
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="${{ env.CCACHE_MAXSIZE }}"
          
          mkdir -p "$CCACHE_DIR"
          
          echo "Configuring CCache size to: $CCACHE_MAXSIZE"
          ccache -M "$CCACHE_MAXSIZE"
          ccache -o compression=true
          
          echo "Initial CCache status:"
          ccache -s
          
          if [ "${{ steps.ccache-restore.outputs.cache-hit }}" == 'true' ]; then
            echo "CCache Hit Details:"
            ccache -sv
          fi

      - name: "Apply SUSFS"
        shell: bash
        run: |
          SUSFS_IN="${{ inputs.SUSFS }}"
          SUSFS_MODE="${{ inputs.susfs_mode }}"
          set -euo pipefail

          if [[ "${{ github.event.inputs.SUSFS }}" != "true" ]]; then
            echo "SUSFS disabled → skipping."
            exit 0
          fi

          # If SukiSU was integrated with susfs-main, DO NOT apply external susfs4oki patches again.
          if [[ "${SUKISU_HAS_SUSFS:-0}" == "1" ]]; then
            echo "SUSFS provided by SukiSU setup (susfs-main) → skipping external SUSFS patch to avoid double-patching."
            exit 0
          fi


          KERNEL_PLATFORM="$GITHUB_WORKSPACE/kernel_workspace"

          # Auto-detect kernel source root (some manifests use common/, some use common/common/)
          CANDIDATES=(
            "$KERNEL_PLATFORM/common"
            "$KERNEL_PLATFORM/common/common"
          )

          KERNEL_DIR=""
          for c in "${CANDIDATES[@]}"; do
            if [[ -f "$c/Makefile" && -d "$c/fs" ]]; then
              KERNEL_DIR="$c"
              break
            fi
          done

          if [[ -z "$KERNEL_DIR" ]]; then
            echo "::error::Could not detect kernel source root under $KERNEL_PLATFORM"
            echo "Listing kernel_platform:"
            ls -la "$KERNEL_PLATFORM" || true
            echo "Listing common candidates:"
            ls -la "$KERNEL_PLATFORM/common" || true
            ls -la "$KERNEL_PLATFORM/common/common" || true
            exit 1
          fi

                    echo "✅ Kernel root detected: $KERNEL_DIR"
          # susfs4oki patches sometimes are generated relative to kernel_platform root (paths start with common/)
          # so we dynamically choose where to apply the patch from.
          KERNEL_PLATFORM="$GITHUB_WORKSPACE/kernel_workspace"
          SRC_REL="$(realpath --relative-to="$KERNEL_PLATFORM" "$KERNEL_DIR" 2>/dev/null || echo "common")"
          echo "Kernel source relpath: $SRC_REL"

          SUSFS_SRC_BRANCH="oki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}"
          SUSFS_PATCH_TAG="gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}"
          echo "Using susfs4oki clone branch: $SUSFS_SRC_BRANCH"
          echo "Using SUSFS patch tag: $SUSFS_PATCH_TAG"

          SUSFS_FOLDER="$GITHUB_WORKSPACE/susfs4oki"
          rm -rf "$SUSFS_FOLDER" || true

          repo="https://github.com/cctv18/susfs4oki.git"
          echo "→ Checking susfs4oki: $repo"
          if ! git ls-remote --exit-code --heads "$repo" "$SUSFS_SRC_BRANCH" >/dev/null 2>&1; then
            echo "::error::Could not find susfs4oki branch '$SUSFS_SRC_BRANCH' on $repo"
            exit 1
          fi

          echo "→ Cloning $repo ($SUSFS_SRC_BRANCH)"
          git clone --depth 1 --no-tags -b "$SUSFS_SRC_BRANCH" "$repo" "$SUSFS_FOLDER"

          echo "::group::Copy SUSFS source/header files (if present)"
          # Some SUSFS branches ship extra files outside the main patch.
          if [[ -d "$SUSFS_FOLDER/kernel_patches/fs" ]]; then
            cp -a "$SUSFS_FOLDER/kernel_patches/fs/." "$KERNEL_DIR/fs/" || true
          fi
          if [[ -d "$SUSFS_FOLDER/kernel_patches/include/linux" ]]; then
            mkdir -p "$KERNEL_DIR/include/linux"
            cp -a "$SUSFS_FOLDER/kernel_patches/include/linux/." "$KERNEL_DIR/include/linux/" || true
          fi
          echo "::endgroup::"

          # --- Pre-adjustments (borrowed from WildKernel) to help the gki-android15-6.6 patch match ---
          fake_patched=0
          if [[ "${{ env.ANDROID_VERSION }}" == "android15" && "${{ env.KERNEL_VERSION }}" == "6.6" ]]; then
            if [[ -f "./fs/namespace.c" ]] && ! grep -qxF '#include <trace/hooks/fs.h>' ./fs/namespace.c; then
              if grep -q '#include <trace/hooks/blk.h>' ./fs/namespace.c; then
                sed -i '/#include <trace\/hooks\/blk.h>/a #include <trace/hooks/fs.h>' ./fs/namespace.c
              else
                # Fallback: inject near top of file
                sed -i '1i #include <trace/hooks/fs.h>' ./fs/namespace.c
              fi
            fi

            if [[ -f "./fs/proc/task_mmu.c" ]] && ! grep -qxF $'\tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' ./fs/proc/task_mmu.c; then
              if grep -q 'int ret = 0, copied = 0;' ./fs/proc/task_mmu.c; then
                echo "Applying temporary context lines for task_mmu.c (for patch matching)..."
                sed -i -e '/int ret = 0, copied = 0;/a \\tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;'                  -e '/int ret = 0, copied = 0;/a \\tpagemap_entry_t *res = NULL;' ./fs/proc/task_mmu.c
                fake_patched=1
              else
                echo "::warning::Anchor line not found in fs/proc/task_mmu.c; skipping temporary context insert."
              fi
            fi
          fi

          PATCH_FILE="$SUSFS_FOLDER/kernel_patches/50_add_susfs_in_${SUSFS_PATCH_TAG}.patch"
          if [[ ! -f "$PATCH_FILE" ]]; then
            echo "::error::Missing SUSFS patch file: $PATCH_FILE"
            echo "Available patches:"
            ls -la "$SUSFS_FOLDER/kernel_patches" || true
            exit 1
          fi

          # Decide patch root based on patch file paths
          PATCH_CWD="$KERNEL_DIR"
          if grep -qE "^diff --git a/common/|^\+\+\+ b/common/" "$PATCH_FILE" >/dev/null 2>&1; then
            PATCH_CWD="$KERNEL_PLATFORM"
          elif grep -qE "^diff --git a/${SRC_REL}/|^\+\+\+ b/${SRC_REL}/" "$PATCH_FILE" >/dev/null 2>&1; then
            PATCH_CWD="$KERNEL_PLATFORM"
          fi
          echo "Patch will be applied from: $PATCH_CWD"
          cd "$PATCH_CWD"

          echo "::group::Apply SUSFS main patch"
          if patch -p1 --dry-run -R < "$PATCH_FILE" >/dev/null 2>&1; then
            echo "↪ SUSFS patch already applied"
          else
            if patch -p1 --dry-run --forward < "$PATCH_FILE" >/dev/null 2>&1; then
              patch -p1 --forward < "$PATCH_FILE"
            else
              echo "Patch does not apply cleanly → retrying with fuzz=3"
              patch -p1 --forward -F 3 < "$PATCH_FILE"
            fi
          fi
          echo "::endgroup::"
          echo "::group::Post-patch SUSFS symbol check"
          if grep -Rqs "KSU_SUSFS" "$KERNEL_DIR" 2>/dev/null; then
            echo "✅ KSU_SUSFS symbols present after SUSFS patch."
            (cd "$KERNEL_DIR" && grep -Rns "KSU_SUSFS" drivers fs include 2>/dev/null | head -n 60) || true
          else
            echo "::warning::KSU_SUSFS symbols still not found after SUSFS patch. This usually means the patch was applied to the wrong root or the branch does not match this kernel tree."
          fi
          echo "::endgroup::"

          # Hard check: SukiSU SUSFS_INLINE_HOOK needs <linux/susfs.h> present in the kernel tree
          if [[ "$SUSFS_IN" == "true" ]]; then
            if [[ -f "$KERNEL_DIR/include/linux/susfs.h" ]]; then
              echo "✅ Found header: $KERNEL_DIR/include/linux/susfs.h"
            else
              echo "::error::SUSFS requested but $KERNEL_DIR/include/linux/susfs.h is missing. SUSFS patch did not land in the real kernel source root."
              echo "::group::Find susfs.h"
              find "$GITHUB_WORKSPACE/kernel_workspace/kernel_platform" -path "*/include/linux/susfs.h" -o -name "susfs.h" | head -n 50 || true
              echo "::endgroup::"
              exit 1
            fi
          fi


          # Revert temporary context lines (if we injected them)
          if [[ "$fake_patched" == "1" ]]; then
            sed -i -e '/unsigned int nr_subpages = __PAGE_SIZE \/ PAGE_SIZE;/d'              -e '/pagemap_entry_t \*res = NULL;/d' ./fs/proc/task_mmu.c || true
          fi


          echo "::group::SUSFS ↔ KernelSU compat (legacy uname helpers)"
          # KernelSU/SukiSU v3.x (some forks) may still reference legacy SUSFS uname helpers that were removed/renamed in SUSFS v2.
          # If so, add small compatibility stubs into fs/susfs.c to satisfy linkage without changing runtime behavior.
          if [[ -f "./drivers/kernelsu/supercalls.c" ]] && grep -q "susfs_uname_is_active" "./drivers/kernelsu/supercalls.c"; then
            echo "KernelSU references legacy uname helpers → adding SUSFS v2 compat stubs"
            if [[ -f "./fs/susfs.c" ]] && ! grep -q "susfs_uname_is_active" "./fs/susfs.c"; then
          python3 - <<'PY'
          from pathlib import Path
          p = Path('./fs/susfs.c')
          code = r'''
          
          /* --- SUSFS v2 compatibility for older KernelSU variants (legacy uname helpers) --- */
          /* Some KernelSU forks still call these legacy helpers. SUSFS v2 uses susfs_set_uname()/susfs_spoof_uname(). */
          #ifdef CONFIG_KSU_SUSFS_SPOOF_UNAME
          bool susfs_uname_is_active(void) { return true; }
          #else
          bool susfs_uname_is_active(void) { return false; }
          #endif
          
          /* Legacy no-op: SUSFS v2 persists uname spoof via susfs_set_uname() from userspace. */
          void susfs_set_uname_from_kernel(void) { }
          
          '''
          src = p.read_text(encoding='utf-8')
          if 'susfs_uname_is_active' not in src:
              p.write_text(src + code, encoding='utf-8')
          PY
            else
              echo "fs/susfs.c missing or compat stubs already present; skipping."
            fi
          else
            echo "KernelSU does not reference legacy uname helpers; no compat needed."
          fi
          echo "::endgroup::"

          echo "::group::SUSFS sanity checks"
          # These checks prevent "SUSFS=On" kernels that actually don't include SUSFS.
          if [[ ! -f "./fs/susfs.c" ]]; then
            echo "::warning::fs/susfs.c not found (patch may embed SUSFS in other files)."
          fi

          if ! grep -Rqs "KSU_SUSFS\|SUSFS" ./fs ./include/linux 2>/dev/null; then
            echo "::error::SUSFS strings not found in fs/ or include/linux after patching. Integration likely failed."
            exit 1
          fi
          echo "::endgroup::"

          echo "✅ SUSFS patching complete."

      - name: "Integrate SukiSU Ultra (builtin, official setup.sh)"
        shell: bash
        run: |
          SUSFS_IN="${{ inputs.SUSFS }}"
          SUSFS_MODE="${{ inputs.susfs_mode }}"
          set -euo pipefail
          die() { echo "::error::$*"; exit 1; }

          KERNEL_PLATFORM="$GITHUB_WORKSPACE/kernel_workspace"

          # Auto-detect actual kernel source root (many trees build from common/, not kernel_platform/).
          CANDIDATES=(
            "$KERNEL_PLATFORM/common"
            "$KERNEL_PLATFORM/common/common"
            "$KERNEL_PLATFORM"
          )

          KERNEL_DIR=""
          for c in "${CANDIDATES[@]}"; do
            if [[ -f "$c/Makefile" && -d "$c/drivers" && -d "$c/arch" ]]; then
              KERNEL_DIR="$c"
              break
            fi
          done

          if [[ -z "$KERNEL_DIR" ]]; then
            echo "::group::kernel_platform layout"
            ls -la "$KERNEL_PLATFORM" || true
            find "$KERNEL_PLATFORM" -maxdepth 3 -type f \( -name Makefile -o -name Kconfig \) | head -n 80 || true
            echo "::endgroup::"
            die "Could not detect kernel source root for SukiSU integration."
          fi

          echo "✅ Kernel source root: $KERNEL_DIR"
          echo "KERNEL_DIR=$KERNEL_DIR" >> "$GITHUB_ENV"

          cd "$KERNEL_DIR"

          SUSFS_IN="${{ github.event.inputs.SUSFS }}"
          SUSFS_MODE="${{ github.event.inputs.susfs_mode }}"

          # Use builtin for current SukiSU integration.
          # main currently lacks the KSU_SUSFS Kconfig menu/symbols, so olddefconfig drops CONFIG_KSU_SUSFS even if
          # the external susfs patch landed correctly. builtin still carries the KSU_SUSFS config block.
          # We keep the local supercalls repair step below to fix the current builtin allow/deny-list ioctl mismatch.
          SETUP_ARG="builtin"
          echo "SUKISU_HAS_SUSFS=0" >> "$GITHUB_ENV"

          echo "→ Fetching SukiSU Ultra setup: https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/builtin/kernel/setup.sh"
          echo "→ Setup arg: $SETUP_ARG"
          SETUP_URL_PRIMARY="https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/builtin/kernel/setup.sh"
          SETUP_URL_FALLBACK="https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh"
          echo "Running: curl -fLSs $SETUP_URL_PRIMARY | bash -s \"$SETUP_ARG\" (fallback: $SETUP_URL_FALLBACK)"
          (curl -fLSs "$SETUP_URL_PRIMARY" | bash -s "$SETUP_ARG") || (curl -fLSs "$SETUP_URL_FALLBACK" | bash -s "$SETUP_ARG")
          # Detect whether this kernel tree actually contains SUSFS config symbols after SukiSU setup.
          # If not, we'll allow the external SUSFS patch step to run (avoids false "susfs-main" assumption).
          if [[ "$SUSFS_IN" == "true" ]]; then
            if grep -Rqs "KSU_SUSFS" ./drivers ./fs ./include 2>/dev/null; then
              echo "✅ Detected KSU_SUSFS symbols in kernel tree."
              echo "SUKISU_HAS_SUSFS=1" >> "$GITHUB_ENV"
            else
              echo "::warning::SUSFS requested but KSU_SUSFS symbols not found after SukiSU setup; will apply external SUSFS patch."
              echo "SUKISU_HAS_SUSFS=0" >> "$GITHUB_ENV"
            fi
          fi

          # Sanity: ensure KernelSU directory exists
          if [ ! -d "KernelSU" ]; then
            echo "::warning::KernelSU directory not found at ./KernelSU; searching..."
            found="$(find . -maxdepth 5 -type d -name KernelSU | head -n 1 || true)"
            [ -n "$found" ] || die "KernelSU directory not found after SukiSU setup."
            echo "Found KernelSU at: $found"
          fi

          # Sanity: ensure KernelSU driver landed in the kernel tree (expected: ./drivers/kernelsu)
          if [ ! -d "drivers/kernelsu" ] && [ ! -L "drivers/kernelsu" ]; then
            echo "::group::SukiSU integration debug"
            echo "pwd: $(pwd)"
            echo ""
            echo "Top-level:"
            ls -la || true
            echo ""
            echo "drivers/ listing:"
            ls -la drivers || true
            echo ""
            echo "Searching for drivers/kernelsu:"
            find . -maxdepth 8 -type d -path "*/drivers/kernelsu" | head -n 50 || true
            echo ""
            echo "Searching for any *kernelsu* directories:"
            find . -maxdepth 8 -type d -iname "*kernelsu*" | head -n 50 || true
            echo "::endgroup::"
            die "KernelSU driver not present after SukiSU setup (drivers/kernelsu missing)."
          fi

          echo "::group::Repair SukiSU supercalls mismatch (allow/deny list IOCTLs)"
          KSU_H="./drivers/kernelsu/supercalls.h"
          KSU_C="./drivers/kernelsu/supercalls.c"
          if [[ -f "$KSU_H" && -f "$KSU_C" ]]; then
            need_fix=0
            grep -q "KSU_IOCTL(KSU_IOCTL_NEW_GET_ALLOW_LIST" "$KSU_C" && need_fix=1 || true
            grep -q "KSU_IOCTL(KSU_IOCTL_NEW_GET_DENY_LIST" "$KSU_C" && need_fix=1 || true
            grep -q "#define KSU_IOCTL_GET_ALLOW_LIST" "$KSU_H" || need_fix=1
            grep -q "#define KSU_IOCTL_GET_DENY_LIST" "$KSU_H" || need_fix=1
            grep -q "struct ksu_new_get_allow_list_cmd" "$KSU_H" || need_fix=1
            grep -q "#define KSU_IOCTL_NEW_GET_ALLOW_LIST" "$KSU_H" || need_fix=1
            grep -q "#define KSU_IOCTL_NEW_GET_DENY_LIST" "$KSU_H" || need_fix=1

            if [[ "$need_fix" == "1" ]]; then
              echo "Applying compatibility repair to drivers/kernelsu/supercalls.[ch]"
              python3 - <<'PY'
          from pathlib import Path
          import re

          h = Path('./drivers/kernelsu/supercalls.h')
          c = Path('./drivers/kernelsu/supercalls.c')
          ht = h.read_text(encoding='utf-8')
          ct = c.read_text(encoding='utf-8')

          # Fix broken macro invocations seen on some builtin revisions.
          ct = ct.replace(
              'KSU_IOCTL(KSU_IOCTL_NEW_GET_ALLOW_LIST, "NEW_GET_ALLOW_LIST", do_new_get_allow_list,',
              'KSU_IOCTL(NEW_GET_ALLOW_LIST, "NEW_GET_ALLOW_LIST", do_new_get_allow_list,',
          )
          ct = ct.replace(
              'KSU_IOCTL(KSU_IOCTL_NEW_GET_DENY_LIST, "NEW_GET_DENY_LIST", do_new_get_deny_list,',
              'KSU_IOCTL(NEW_GET_DENY_LIST, "NEW_GET_DENY_LIST", do_new_get_deny_list,',
          )

          def insert_before_endif(src: str, block: str) -> str:
              if block in src:
                  return src
              m = re.search(r'\n#endif\s*$', src)
              if m:
                  return src[:m.start()] + '\n' + block.rstrip() + '\n' + src[m.start():]
              return src.rstrip() + '\n\n' + block.rstrip() + '\n'

          new_struct = """struct ksu_new_get_allow_list_cmd {
            __u16 count; // Input / Output: number of UIDs in array
            __u16 total_count; // Output: total number of UIDs in requested list
            __u32 uids[0]; // Output: array of allowed/denied UIDs
          };"""
          legacy_defs = """#define KSU_IOCTL_GET_ALLOW_LIST _IOC(_IOC_READ | _IOC_WRITE, 'K', 6, 0)
          #define KSU_IOCTL_GET_DENY_LIST _IOC(_IOC_READ | _IOC_WRITE, 'K', 7, 0)"""
          new_defs = """#define KSU_IOCTL_NEW_GET_ALLOW_LIST \
            _IOWR('K', 6, struct ksu_new_get_allow_list_cmd)
          #define KSU_IOCTL_NEW_GET_DENY_LIST \
            _IOWR('K', 7, struct ksu_new_get_allow_list_cmd)"""

          if 'struct ksu_new_get_allow_list_cmd' not in ht:
              ht = insert_before_endif(ht, new_struct)
          if '#define KSU_IOCTL_GET_ALLOW_LIST' not in ht or '#define KSU_IOCTL_GET_DENY_LIST' not in ht:
              ht = insert_before_endif(ht, legacy_defs)
          if '#define KSU_IOCTL_NEW_GET_ALLOW_LIST' not in ht or '#define KSU_IOCTL_NEW_GET_DENY_LIST' not in ht:
              ht = insert_before_endif(ht, new_defs)

          h.write_text(ht, encoding='utf-8')
          c.write_text(ct, encoding='utf-8')
          print('Repaired supercalls compatibility for legacy/new allow-deny list ioctls.')
          PY
              echo "Post-repair symbol check:"
              grep -nE 'KSU_IOCTL_(GET|NEW_GET)_(ALLOW|DENY)_LIST|ksu_new_get_allow_list_cmd' "$KSU_H" || true
            else
              echo "No supercalls repair needed."
            fi
          else
            echo "drivers/kernelsu/supercalls.[ch] not found; skipping repair."
          fi
          echo "::endgroup::"

      - name: "SukiSU SUSFS kernel-r25 compat (TRY_UMOUNT)"
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event.inputs.SUSFS }}" != "true" ]]; then
            echo "SUSFS Off → skipping SUSFS r25 compat patch."
            exit 0
          fi

          KDIR="$GITHUB_WORKSPACE/kernel_workspace/common"

          # After SukiSU setup.sh, drivers/kernelsu is a symlink into $KDIR/KernelSU/kernel
          KSU_KCONFIG="$KDIR/drivers/kernelsu/Kconfig"
          KSU_SETUID="$KDIR/drivers/kernelsu/setuid_hook.c"

          if [[ ! -f "$KSU_KCONFIG" ]]; then
            echo "::error::KernelSU Kconfig not found at: $KSU_KCONFIG"
            exit 1
          fi

          if ! grep -q "config KSU_SUSFS_TRY_UMOUNT" "$KSU_KCONFIG"; then
            echo "→ Adding CONFIG_KSU_SUSFS_TRY_UMOUNT to KernelSU Kconfig (required by SUSFS module r25+)."
            python3 - "$KSU_KCONFIG" <<'PY'
          import sys
          from pathlib import Path

          p = Path(sys.argv[1])
          t = p.read_text()

          sym = 'config KSU_SUSFS_TRY_UMOUNT'
          if sym not in t:
              insert = (
                  'config KSU_SUSFS_TRY_UMOUNT\n'
                  '\tbool "Try umount at post-fs-data"\n'
                  '\tdepends on KSU_SUSFS\n'
                  '\tdefault y\n'
                  '\thelp\n'
                  '\t  SUSFS module (kernel-r25+) compatibility: enables try_umount support.\n'
                  '\n'
              )
              key = 'config KSU_SUSFS_SPOOF_UNAME'
              if key in t:
                  t = t.replace(key, insert + key, 1)
              else:
                  t = t.rstrip() + '\n\n' + insert + '\n'
              p.write_text(t)
              print('Inserted KSU_SUSFS_TRY_UMOUNT into Kconfig.')
          else:
              print('KSU_SUSFS_TRY_UMOUNT already present.')
          PY
          else
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT already present."
          fi

          if [[ -f "$KSU_SETUID" ]] && ! grep -q "susfs_try_umount(" "$KSU_SETUID"; then
            echo "→ Wiring susfs_try_umount() call after kernel umount."
            python3 - "$KSU_SETUID" <<'PY'
          import sys
          from pathlib import Path

          p = Path(sys.argv[1])
          t = p.read_text()

          if 'susfs_try_umount(' in t:
              print('susfs_try_umount already present.')
              raise SystemExit(0)

          marker = 'ksu_handle_umount(old_uid, new_uid);'
          if marker not in t:
              print('Marker not found; skipping setuid_hook patch.')
              raise SystemExit(0)

          hook = (
              marker + '\n\n'
              + '#ifdef CONFIG_KSU_SUSFS_TRY_UMOUNT\n'
              + '\t// SUSFS module (kernel-r25+) compatibility hook\n'
              + '\tsusfs_try_umount(new_uid);\n'
              + '#endif\n'
          )

          t = t.replace(marker, hook, 1)
          p.write_text(t)
          print('Patched setuid_hook.c with susfs_try_umount().')
          PY
          else
            echo "setuid_hook.c already contains susfs_try_umount() (or missing) — skipping."
          fi

          echo "✅ SukiSU SUSFS r25 compat patch applied."
          
      - name: Apply LZ4 1.10.0 & ZSTD 1.5.7 Patches
        if: inputs.lz4_enable
        run: |
          echo "Adding LZ4 & ZSTD patches..."
          cd kernel_workspace
          git clone --depth=1 https://github.com/$GITHUB_REPOSITORY.git -b $GITHUB_REF_NAME $GITHUB_ACTOR || true
          cp ./$GITHUB_ACTOR/zram_patch/001-lz4.patch ./common/ || true
          cp ./$GITHUB_ACTOR/zram_patch/lz4armv8.S ./common/lib || true
          cp ./$GITHUB_ACTOR/zram_patch/002-zstd.patch ./common/ || true
          cd ./common
          git apply -p1 < 001-lz4.patch || true
          patch -p1 < 002-zstd.patch || true

      - name: Apply LZ4KD Patch
        if: inputs.lz4kd_enable
