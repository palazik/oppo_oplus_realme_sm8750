          except Exception as ex:
              import sys
              print(f"telegra.ph exception: {ex}", file=sys.stderr)
              print("")
          PYEOF
          )
          fi

          # ── Telegram message ──────────────────────────────────────────────
          [ -n "$TELEGRAPH_URL" ] \
            && NOTES_LINE="📖 <a href=\"${TELEGRAPH_URL}\">Build Notes</a>" \
            || NOTES_LINE="📖 <a href=\"${RUN_URL}\">Actions Run</a>"

          _f() { [ "$1" = "true" ] && echo "✅" || echo "❌"; }
          _fb() { [ "$1" != "false" ] && echo "✅" || echo "❌"; }

          MESSAGE="${STATUS_EMOJI} <b>Kernel Build ${STATUS_TEXT}</b> #${BUILD_NUM}

          📱 <b>OnePlus 13 PJZ110</b> · SM8750
          🔧 <b>${KSU_DISPLAY}</b> <code>v${KSUVER}</code>
          🏷 <code>${{ github.event.inputs.kernel_version }}-${SUFFIX}</code> · LTO: <code>${LTO}</code> · <code>${CLANG}</code>

          <b>Root &amp; Security:</b>
          $(_f $SUSFS) SuSFS  $(_fb $KPM) KPM(${KPM})  $(_f $BBG) BBG  $(_f $MM) MultiMgr

          <b>Network &amp; IO:</b>
          $(_fb $BBR) BBR/Brutal(${BBR})  $(_f $ADIOS) ADIOS

          <b>Memory &amp; FS:</b>
          $(_f $LZ4) LZ4·1.10  $(_f $LZ4KD) LZ4KD  $(_f $ZWB) ZRAM_WB

          <b>Performance:</b>
          $(_f $SCHED) SchedUtil  $(_f $HMBIRD) HMBIRD  $(_f $UFIX) UniFix

          <b>Extra:</b>
          $(_f $CPU_OPT) CPU·Oryon  $(_f $F2FS) F2FS  $(_f $WG) WireGuard  $(_f $LRNG) LRNG  $(_f $WLB) WakeLockBlk

          🕐 <code>${TIME_NOW}</code>
          ${NOTES_LINE}  🔗 <a href=\"${RUN_URL}\">Run</a>"

          python3 - "$TELEGRAM_TOKEN" "$TELEGRAM_CHAT_ID" "$MESSAGE" << 'PYEOF'
          import sys, json, urllib.request, urllib.parse
          token, chat_id, message = sys.argv[1], sys.argv[2], sys.argv[3]
          data = json.dumps({
              "chat_id": chat_id,
              "text": message,
              "parse_mode": "HTML",
              "disable_web_page_preview": False,
              "link_preview_options": {"is_disabled": False}
          }).encode()
          req = urllib.request.Request(
