name: FastBuild NON-ROOT OP13 Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.kernel_version }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android15'
  KERNEL_VERSION: '6.6'
  KERNEL_NAME: 'android15-8-g29d86c5fc9dd-abogki428889875-4k'
  CCACHE_KEY: ccache-neov4-${{ github.event.inputs.kernel_version }}

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Choose kernel version to build'
        required: true
        type: choice
        default: '6.6.89'
        options:
          - '6.6.89'
          - '6.6.118'
          - '6.6.111'
          - '6.6.100'
      clang_version:
        description: 'Choose clang version for building kernel'
        required: true
        type: choice
        default: 'zyc_clang'
        options:
          - 'zyc_clang'
          - 'neutron'
          - 'aosp_clang'
          - 'clang20'
          - 'clang18'
      baseband_guard:
        description: 'Enable Baseband Guard (Anti-brick modem protection)'
        required: true
        type: boolean
        default: true
      ccache_update:
        description: 'Update CCache (Enable if changing source/configs or refreshing cache)'
        required: true
        type: boolean
        default: false
      unicode_fix:
        description: 'Enable Unicode Bypass Fix (path traversal protection)'
        required: true
        type: boolean
        default: true
      schedutil_opt:
        description: 'Enable SchedUtil optimizations (better CPU governor)'
        required: true
        type: boolean
        default: true
      telegram_notify:
        description: 'Send Telegram notification after build'
        required: true
        type: boolean
        default: true
      github_release:
        description: 'Create GitHub Release'
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
    permissions:
      actions: write
      contents: read
    steps:

      - name: Install dependencies & Init Source/Clang
        run: |
          mkdir -p kernel_workspace
          cd kernel_workspace
          echo "Current Repo: $GITHUB_REPOSITORY"
          echo "Current Branch: $GITHUB_REF_NAME"
          
          sudo apt-mark hold firefox &&
          sudo apt-mark hold libc-bin &&
          sudo apt purge man-db &&
          sudo rm -rf /var/lib/man-db/auto-update &&
          sudo apt update &&
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev ccache aria2 &

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android

          if [[ ${{ github.event.inputs.kernel_version }} == "6.6.89" ]]; then
            echo "Cloning source repository..."
            curl -L https://github.com/cctv18/android_kernel_common_oneplus_sm8750/archive/refs/heads/oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89.zip -o common.zip && 
            unzip -q common.zip && 
            mv "android_kernel_common_oneplus_sm8750-oneplus-sm8750_v_16.0.0_oneplus_13_6.6.89" common &&
            rm -rf common.zip &

          elif [[ ${{ github.event.inputs.kernel_version }} == "6.6.100" ]]; then
            echo "Cloning source repository..."
            curl -L https://github.com/palazik/OnePlus_Kernel_Backport/archive/refs/heads/6.6.100_oneplus13_coloros16.0.5.zip -o common.zip && 
            unzip -q common.zip && 
            mv OnePlus_Kernel_Backport-* common &&
            rm -rf common.zip &

          elif [[ ${{ github.event.inputs.kernel_version }} == "6.6.118" ]]; then
            echo "Cloning source repository..."
            curl -L https://github.com/palazik/OnePlus_Kernel_Backport/archive/refs/heads/6.6.118_oneplus13_coloros16.0.5.zip -o common.zip && 
            unzip -q common.zip && 
            mv OnePlus_Kernel_Backport-* common &&
            rm -rf common.zip &

          elif [[ ${{ github.event.inputs.kernel_version }} == "6.6.111" ]]; then
            echo "Cloning source repository..."
            curl -L https://github.com/palazik/OnePlus_Kernel_Backport/archive/refs/heads/6.6.111_oneplus13_coloros16.0.5.zip -o common.zip && 
            unzip -q common.zip && 
            mv OnePlus_Kernel_Backport-* common &&
            rm -rf common.zip &
          fi

          echo "Fetching ZyCromerZ Clang 19 (Oryon Supported)..."
          mkdir -p zyc-clang
          aria2c -s16 -x16 -k1M "https://github.com/ZyCromerZ/Clang/releases/download/19.0.0git-20240723-release/Clang-19.0.0git-20240723.tar.gz" -o zyc-clang.tar.gz
          tar -C zyc-clang -zxf zyc-clang.tar.gz
          rm -rf zyc-clang.tar.gz &

          echo "Fetching CodeLinaro/Qualcomm Build Tools (For perfect BTF compat)..."
          # Pulling the exact branch from the OP13 XML manifest
          git clone --depth=1 -b ks-kernel.lnx.4.0.r1-rel https://git.codelinaro.org/clo/la/kernel/prebuilts/build-tools.git build-tools &
          
          wait
          echo "Source and tools initialized successfully!"
          echo "Removing ABI protection & dirty suffix..."
          rm common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done

      - name: Configure CCache Directory
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_${{ github.event.inputs.kernel_version }}" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=3G" >> $GITHUB_ENV
          echo "Current Disk Space:"
          df -h
          echo "Current Build Kernel Version: ${{ github.event.inputs.kernel_version }}"

      - name: Restore CCache
        uses: actions/cache/restore@v4
        id: ccache-restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}-
            ${{ env.CCACHE_KEY }}-${{ runner.os }}-
            ${{ env.CCACHE_KEY }}-

      - name: Pull Public CCache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking local cache status..."
          if [ -d "${{ env.CCACHE_DIR }}" ] && [ "$(ls -A ${{ env.CCACHE_DIR }} 2>/dev/null)" ]; then
            echo "Local cache loaded successfully, skipping public cache pull!"
            exit 0
          fi
          
          echo "Cache miss, attempting to pull public ccache..."
          mkdir -p ${{ env.CCACHE_DIR }}
          FILE_NAME="ccache-${{ github.event.inputs.kernel_version }}.tar.zst"
          
          if gh release download -p "$FILE_NAME" -R cctv18/public_ccache; then
            echo "Successfully downloaded $FILE_NAME, extracting..."
            tar -I zstd -xf "$FILE_NAME" -C ${{ env.CCACHE_DIR }}
            echo "Public ccache restored successfully!"
          else
            echo "Public ccache not found, proceeding with full clean build..."
          fi

      - name: Clear Old CCache
        if: inputs.ccache_update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Clearing old ccache from repository..."
          if gh cache delete ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }} -R ${{ github.repository }}; then
            echo "Successfully deleted old ccache!"
          else
            echo "Old cache does not exist or was already cleared!"
          fi
      
      - name: Init and Config CCache
        run: |
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="${{ env.CCACHE_MAXSIZE }}"
          
          mkdir -p "$CCACHE_DIR"
          
          echo "Configuring CCache size to: $CCACHE_MAXSIZE"
          ccache -M "$CCACHE_MAXSIZE"
          ccache -o compression=true
          ccache -o compression_level=1
          
          echo "Initial CCache status:"
          ccache -s
          
          if [ "${{ steps.ccache-restore.outputs.cache-hit }}" == 'true' ]; then
            echo "CCache Hit Details:"
            ccache -sv
          fi

      - name: Apply kernel patches
        run: |
          cd kernel_workspace
          DEFCONFIG="./common/arch/arm64/configs/gki_defconfig"
          # FastBuild
          echo "CONFIG_DEBUG_INFO_NONE=y" >> ./common/arch/arm64/configs/gki_defconfig
 
      - name: Apply Unicode Bypass Fix
        if: inputs.unicode_fix
        working-directory: kernel_workspace/common
        run: |
          echo "Applying Unicode Bypass Fix..."
          # Патч предотвращает path traversal через non-printable unicode codepoints
          cat > /tmp/unicode_fix.patch << 'PATCH'
          --- a/fs/namei.c
          +++ b/fs/namei.c
          PATCH
          # Используем патч от TheWildJames если есть в репо
          PATCH_URL="https://github.com/TheWildJames/kernel_patches/raw/main/common/unicode_bypass_fix_6.1+.patch"
          wget -qO /tmp/ub_fix.patch "$PATCH_URL" 2>/dev/null && \
            patch -p1 --forward < /tmp/ub_fix.patch || true
          echo "Unicode fix applied (or already present)"

      - name: Enable WireGuard
        if: inputs.wireguard
        working-directory: kernel_workspace
        run: |
          echo "Enabling WireGuard..."
          cat >> common/arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_WIREGUARD=y
          EOF

      - name: Configure Baseband Guard
        if: inputs.baseband_guard
        run: |
          echo "Enabling Baseband Guard Support..."
          cd kernel_workspace
          echo "CONFIG_BBG=y" >> ./common/arch/arm64/configs/gki_defconfig
          cd ./common
          curl -sSL https://github.com/cctv18/Baseband-guard/raw/master/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      - name: Add Localversion
        run: |
          cd kernel_workspace
          echo "Fixing uname / kernel suffix..."
          
          # If you type a suffix (like 'palaziks'), this cleanly swaps the generic '-4k' 
          # at the end of the Android 15 string with your suffix, keeping the letters!
          sudo sed -i "s/-4k/-palaziks-ShiftPorts/g" ./common/arch/arm64/configs/gki_defconfig
          
          # Clean up Git hashes so no dirty '+' sign gets added
          sed -i 's/${scm_version}//' ./common/scripts/setlocalversion
          echo "CONFIG_LOCALVERSION_AUTO=n" >> ./common/arch/arm64/configs/gki_defconfig

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: "Fix permissions for overwriter scripts"
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/kernel_workspace/common"
          chmod +x drivers/of/overwriter/overwrite_configs/convert_configs.sh 2>/dev/null || true
          chmod +x drivers/of/overwriter/overwrite_configs/*.sh 2>/dev/null || true
            
      - name: Build Kernel
        run: |
          WORKDIR="$(pwd)"
          export MAP="-fdebug-prefix-map=${GITHUB_WORKSPACE}=. -fmacro-prefix-map=${GITHUB_WORKSPACE}=. -ffile-prefix-map=${GITHUB_WORKSPACE}=."
          export PATH="/usr/lib/ccache:$PATH"
          # Dynamic Pathing based on Toolchain selection
          if [[ "${{ github.event.inputs.clang_version }}" == "zyc_clang" ]]; then
            export PATH="$WORKDIR/kernel_workspace/zyc-clang/bin:$WORKDIR/kernel_workspace/build-tools/linux-x86/bin:$PATH"
            CLANG_DIR="$WORKDIR/kernel_workspace/zyc-clang/bin"
          elif [[ "${{ github.event.inputs.clang_version }}" == "aosp_clang" ]]; then
            # FIX: Removed linux-x86/ since tar.gz extracts directly to bin/
            export PATH="$WORKDIR/kernel_workspace/clang-aosp/bin:$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
            CLANG_DIR="$WORKDIR/kernel_workspace/clang-aosp/bin"
          elif [[ "${{ github.event.inputs.clang_version }}" == "neutron" ]]; then
            # FIX: Removed linux-x86/ since tar.gz extracts directly to bin/
            export PATH="$WORKDIR/kernel_workspace/neutron-clang/bin:$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
            CLANG_DIR="$WORKDIR/kernel_workspace/neutron-clang/bin"
          else
            export PATH="$WORKDIR/kernel_workspace/clang18/bin:$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
            CLANG_DIR="$WORKDIR/kernel_workspace/clang18/bin"
          fi
          CLANG_VERSION="$($CLANG_DIR/clang --version | head -n 1)"
          LLD_VERSION="$($CLANG_DIR/ld.lld --version | head -n 1)"
          echo "Compiler Info:"
          echo "Clang Version: $CLANG_VERSION"
          echo "LLD Version: $LLD_VERSION"
          pahole_version=$(pahole --version 2>/dev/null | head -n1); [ -z "$pahole_version" ] && echo "Pahole: Not Installed" || echo "Pahole: $pahole_version"
          
          export CCACHE_LOGFILE="${{ github.workspace }}/kernel_workspace/ccache.log"
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="10G"
          echo "sloppiness = file_stat_matches,include_file_ctime,include_file_mtime,pch_defines,file_macro,time_macros" >> "$CCACHE_DIR/ccache.conf"
          
          cd kernel_workspace/common
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfakestat.so || true
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfaketimeMT.so || true
          chmod 777 ./*.so || true
          export FAKESTAT="2025-05-25 12:00:00"
          export FAKETIME="@2025-05-25 13:00:00"
          echo "FAKESTAT=$FAKESTAT" >> $GITHUB_ENV
          echo "FAKETIME=$FAKETIME" >> $GITHUB_ENV
          SO_DIR=$(pwd)
          export PRELOAD_LIBS="$SO_DIR/libfakestat.so $SO_DIR/libfaketimeMT.so"
          
          echo '#!/bin/bash' > cc-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> cc-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> cc-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> cc-wrapper
          echo 'ccache clang "$@"' >> cc-wrapper
          
          echo '#!/bin/bash' > ld-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> ld-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> ld-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> ld-wrapper
          echo 'ld.lld "$@"' >> ld-wrapper
          
          echo "--- [Wrapper Test] Creating Time Hijack Test Script ---"
          echo '#!/bin/bash' > test-wrapper.sh
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> test-wrapper.sh
          echo 'export FAKESTAT="'$FAKESTAT'"' >> test-wrapper.sh
          echo 'export FAKETIME="'$FAKETIME'"' >> test-wrapper.sh
          echo 'echo ">>> Wrapper environment check complete."' >> test-wrapper.sh
          echo 'exec "$@"' >> test-wrapper.sh
          chmod +x test-wrapper.sh
          echo "--- [Wrapper Test] Testing (date) command ---"
          ./test-wrapper.sh date
          echo "--- [Wrapper Test] Testing (stat) command ---"
          ./test-wrapper.sh stat ./Makefile
          echo "--- [Wrapper Test] Test Complete ---"
          chmod +x cc-wrapper ld-wrapper
          
          echo "--- Pre-Build Time: $(LD_PRELOAD=$PRELOAD_LIBS date) ---"
          echo "--- Pre-Build File Timestamps: ---"
          LD_PRELOAD=$PRELOAD_LIBS stat ./Makefile
          
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          
          make -j$(nproc --all) LLVM=1 LLVM_IAS=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out \
            KCFLAGS="-O2 -Wno-error -Wno-implicit-function-declaration -Wno-implicit-int -Wno-default-const-init-var-unsafe -Wno-format -Wno-unknown-warning-option" \
            gki_defconfig
          
          make -j$(nproc --all) LLVM=1 LLVM_IAS=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out \
            KCFLAGS="-O2 -Wno-error -Wno-implicit-function-declaration -Wno-implicit-int -Wno-default-const-init-var-unsafe -Wno-format -Wno-unknown-warning-option ${EXTRA_CFLAGS:-} ${MAP}" \
            Image

          echo "--- Post-Build Time: $(LD_PRELOAD=$PRELOAD_LIBS date) ---"
          echo "--- Post-Build File Timestamps: ---"
          LD_PRELOAD=$PRELOAD_LIBS stat ./Makefile
          echo "Kernel Compilation Complete!"
          echo "CCache Status:"
          ccache -s
          echo "Disk Space Post-Build:"
          df -h

      - name: Save New CCache
        if: success() || github.event.inputs.ccache_update == 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          
      - name: Clone AnyKernel3 and Package ZIP
        id: create_zip
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git
          cd AnyKernel3
          cp ../common/out/arch/arm64/boot/Image ./Image
          if [[ ! -f ./Image ]]; then
            echo "Kernel Image not found, build may have failed."
            exit 1
          fi
          KSU_TYPENAME="NON-ROOT"
            AK3_NAME=AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_${{ github.event.inputs.kernel_version }}_palaziks.zip
            FULL_VERSION=${{ github.event.inputs.kernel_version }}-palaziks
            AK3_NAME=AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_${{ github.event.inputs.kernel_version }}_${{ env.KERNEL_NAME }}.zip
            FULL_VERSION=${{ github.event.inputs.kernel_version }}-${{ env.KERNEL_NAME }}
          
          zip -r ../$AK3_NAME ./*
          echo "ak3name=$AK3_NAME" >> $GITHUB_OUTPUT
          
          TIME_NOW="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "Author: $GITHUB_ACTOR" > ./ak3.log
          echo "Repo: $GITHUB_REPOSITORY" >> ./ak3.log
          echo "Branch: $GITHUB_REF_NAME" >> ./ak3.log
          echo "Run ID: $GITHUB_RUN_ID" >> ./ak3.log
          echo "Commit: $GITHUB_SHA" >> ./ak3.log
          echo "Time: $TIME_NOW" >> ./ak3.log
          echo "Kernel Ver: $FULL_VERSION" >> ./ak3.log
          echo "KSU Branch: ${KSU_TYPENAME}" >> ./ak3.log
          echo "KSU Ver: ${KSUVER}" >> ./ak3.log
          echo "BBG: ${{ github.event.inputs.baseband_guard }}" >> ./ak3.log
          zip -z ../$AK3_NAME < ./ak3.log

      - name: Upload ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create_zip.outputs.ak3name }}
          path: ${{ github.workspace }}/kernel_workspace/AnyKernel*.zip

      - name: Send Telegram Notification
        if: inputs.telegram_notify && always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BUILD_STATUS="${{ job.status }}"
          BUILD_NUM="${{ github.run_number }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPO="${{ github.repository }}"
          TIME_NOW="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S') CST"

          KSU_TYPE="NON-ROOT"
          KSU_DISPLAY="NON-ROOT"
          KSUVER="${{ env.KSUVER }}"
          SUFFIX="-palaziks-ShiftPorts"
          BBG="${{ github.event.inputs.baseband_guard }}"
          UFIX="${{ github.event.inputs.unicode_fix }}"
          SCHED="${{ github.event.inputs.schedutil_opt }}"
          CLANG="${{ github.event.inputs.clang_version }}"

          if [ "$BUILD_STATUS" = "success" ]; then
            STATUS_EMOJI="✅"; STATUS_TEXT="SUCCESS"
          else
            STATUS_EMOJI="❌"; STATUS_TEXT="FAILED"
          fi

          # ── Telegra.ph ────────────────────────────────────────────────────
          # Все переменные передаём через env чтобы Python их видел
          TELEGRAPH_URL=""
          if [ "$BUILD_STATUS" = "success" ]; then
            export TG_KERNEL_VERSION="${{ github.event.inputs.kernel_version }}"
            export TG_KSU_DISPLAY="$KSU_DISPLAY"
            export TG_KSUVER="$KSUVER"
            export TG_SUFFIX="$SUFFIX"
            export TG_LTO="$LTO"
            export TG_BUILD_NUM="$BUILD_NUM"
            export TG_TIME_NOW="$TIME_NOW"
            export TG_RUN_URL="$RUN_URL"
            export TG_REPO="$REPO"
            export TG_BBG="$BBG"
            export TG_CLANG="$CLANG"

            TELEGRAPH_URL=$(python3 << 'PYEOF'
          import json, urllib.request, urllib.parse, os

          e = os.environ.get

          def feat(val, name):
              icon = "✅" if val == "true" else "❌"
              return {"tag": "li", "children": [f"{icon} {name}"]}

          content = [
              {"tag": "h3", "children": [f"OnePlus 13 (PJZ110) — palaziks kernel"]},
              {"tag": "hr"},
              {"tag": "h4", "children": ["📋 Build Info"]},
              {"tag": "table", "children": [
                  {"tag": "tr", "children": [
                      {"tag": "td", "children": ["Device"]},
                      {"tag": "td", "children": ["OnePlus 13 PJZ110 (CN) / SM8750"]}
                  ]},
                  {"tag": "tr", "children": [
                      {"tag": "td", "children": ["Kernel"]},
                      {"tag": "td", "children": [f"{e('TG_KERNEL_VERSION')}-android15"]}
                  ]},
                  {"tag": "tr", "children": [
                      {"tag": "td", "children": ["Manager"]},
                      {"tag": "td", "children": [f"{e('TG_KSU_DISPLAY')} v{e('TG_KSUVER')}"]}
                  ]},
                  {"tag": "tr", "children": [
                      {"tag": "td", "children": ["Suffix"]},
                      {"tag": "td", "children": [f"-{e('TG_SUFFIX')}"]}
                  ]},
                  {"tag": "tr", "children": [
                      {"tag": "td", "children": ["LTO"]},
                      {"tag": "td", "children": [e("TG_LTO")]}
                  ]},
                  {"tag": "tr", "children": [
                      {"tag": "td", "children": ["Clang"]},
                      {"tag": "td", "children": [e("TG_CLANG")]}
                  ]},
                  {"tag": "tr", "children": [
                      {"tag": "td", "children": ["Build #"]},
                      {"tag": "td", "children": [e("TG_BUILD_NUM")]}
                  ]},
                  {"tag": "tr", "children": [
                      {"tag": "td", "children": ["Time"]},
                      {"tag": "td", "children": [e("TG_TIME_NOW")]}
                  ]},
              ]},
              {"tag": "hr"},
              {"tag": "h4", "children": ["⚡ Features"]},
              {"tag": "ul", "children": [
                  feat(e("TG_SUSFS"),  "SuSFS"),
                  feat(e("TG_KPM") != "false" and "true" or "false", f"KPM ({e('TG_KPM')})"),
                  feat(e("TG_BBR") != "false" and "true" or "false",  f"BBR/Brutal ({e('TG_BBR')})"),
                  feat(e("TG_ADIOS"),  "ADIOS IO Scheduler"),
                  feat(e("TG_BBG"),    "Baseband Guard"),
                  feat(e("TG_UFIX"),   "Unicode Bypass Fix"),
              ]},
              {"tag": "hr"},
              {"tag": "h4", "children": ["📥 Installation"]},
              {"tag": "ol", "children": [
                  {"tag": "li", "children": ["Flash AnyKernel3 zip via TWRP or KernelFlasher"]},
                  {"tag": "li", "children": ["Install metamodule: mountify / meta-overlayfs / meta-magicmount"]},
                  {"tag": "li", "children": ["For GKI: patch init_boot with your KSU manager, then fastboot flash init_boot"]},
              ]},
              {"tag": "hr"},
              {"tag": "p", "children": [
                  {"tag": "a", "attrs": {"href": e("TG_RUN_URL")}, "children": ["🔗 GitHub Actions Run"]},
                  "  |  ",
                  {"tag": "a", "attrs": {"href": f"https://github.com/{e('TG_REPO')}"}, "children": [f"📦 {e('TG_REPO')}"]},
              ]},
              {"tag": "p", "children": [f"Built by @palaziks"]},
          ]

          data = {
              "access_token": "b968da509d524a21f53f1f2db42fa18d5c0d54a1b8e4b65c",
              "title": f"palaziks kernel — OP13 {e('TG_KERNEL_VERSION')}-{e('TG_SUFFIX')} #{e('TG_BUILD_NUM')}",
              "author_name": "palaziks",
              "author_url": f"https://github.com/{e('TG_REPO')}",
              "content": json.dumps(content),
              "return_content": "false"
          }

          req = urllib.request.Request(
              "https://api.telegra.ph/createPage",
              data=urllib.parse.urlencode(data).encode(),
              method="POST"
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  result = json.load(resp)
                  if result.get("ok"):
                      print(result["result"]["url"])
                  else:
                      import sys
                      print(f"telegra.ph error: {result}", file=sys.stderr)
                      print("")
          except Exception as ex:
              import sys
              print(f"telegra.ph exception: {ex}", file=sys.stderr)
              print("")
          PYEOF
          )
          fi

          # ── Telegram message ──────────────────────────────────────────────
          [ -n "$TELEGRAPH_URL" ] \
            && NOTES_LINE="📖 <a href=\"${TELEGRAPH_URL}\">Build Notes</a>" \
            || NOTES_LINE="📖 <a href=\"${RUN_URL}\">Actions Run</a>"

          _f() { [ "$1" = "true" ] && echo "✅" || echo "❌"; }
          _fb() { [ "$1" != "false" ] && echo "✅" || echo "❌"; }

          MESSAGE="${STATUS_EMOJI} <b>Kernel Build ${STATUS_TEXT}</b> #${BUILD_NUM}

          📱 <b>OnePlus 13 PJZ110</b> · SM8750
          🔧 <b>${KSU_DISPLAY}</b> <code>v${KSUVER}</code>
          🏷 <code>${{ github.event.inputs.kernel_version }}-${SUFFIX}</code> · LTO: <code>${LTO}</code> · <code>${CLANG}</code>

          <b>Root &amp; Security:</b>
          $(_f $SUSFS) SuSFS  $(_fb $KPM) KPM(${KPM})  $(_f $BBG) BBG  $(_f $MM) MultiMgr

          <b>Network &amp; IO:</b>
          $(_fb $BBR) BBR/Brutal(${BBR})  $(_f $ADIOS) ADIOS

          <b>Memory &amp; FS:</b>
          $(_f $LZ4) LZ4·1.10  $(_f $LZ4KD) LZ4KD  $(_f $ZWB) ZRAM_WB

          <b>Performance:</b>
          $(_f $SCHED) SchedUtil  $(_f $HMBIRD) HMBIRD  $(_f $UFIX) UniFix

          <b>Extra:</b>
          $(_f $CPU_OPT) CPU·Oryon  $(_f $F2FS) F2FS  $(_f $WG) WireGuard  $(_f $LRNG) LRNG  $(_f $WLB) WakeLockBlk

          🕐 <code>${TIME_NOW}</code>
          ${NOTES_LINE}  🔗 <a href=\"${RUN_URL}\">Run</a>"

          python3 - "$TELEGRAM_TOKEN" "$TELEGRAM_CHAT_ID" "$MESSAGE" << 'PYEOF'
          import sys, json, urllib.request, urllib.parse
          token, chat_id, message = sys.argv[1], sys.argv[2], sys.argv[3]
          data = json.dumps({
              "chat_id": chat_id,
              "text": message,
              "parse_mode": "HTML",
              "disable_web_page_preview": False,
              "link_preview_options": {"is_disabled": False}
          }).encode()
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=data,
              headers={"Content-Type": "application/json"},
              method="POST"
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  result = json.load(r)
                  print("Telegram:", "OK" if result.get("ok") else f"ERROR: {result.get('description')}")
          except Exception as e:
              print(f"Telegram exception: {e}")
          PYEOF

          # ── Upload ZIP ────────────────────────────────────────────────────
          if [ "$BUILD_STATUS" = "success" ]; then
            ZIP_FILE=$(find "${{ github.workspace }}/kernel_workspace" -name "AnyKernel3*.zip" | head -1)
            if [ -n "$ZIP_FILE" ] && [ -f "$ZIP_FILE" ]; then
              ZIP_SIZE=$(du -sh "$ZIP_FILE" | cut -f1)
              ZIP_NAME=$(basename "$ZIP_FILE")
              echo "Uploading: $ZIP_NAME ($ZIP_SIZE)"
              CAPTION=$(printf "📦 %s\n📏 %s\n🔢 Build #%s\n⚙️ %s · LTO:%s" \
                "$ZIP_NAME" "$ZIP_SIZE" "$BUILD_NUM" "$KSU_DISPLAY v$KSUVER" "$LTO")
              curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument" \
                -F "chat_id=${TELEGRAM_CHAT_ID}" \
                -F "document=@${ZIP_FILE}" \
                -F "caption=${CAPTION}" \
                | python3 -c "
          import json,sys
          r=json.load(sys.stdin)
          print('ZIP upload: OK' if r.get('ok') else f'ZIP upload ERROR: {r.get(\"description\")}')
          " || echo "ZIP upload failed (size limit?)"
            fi
          fi

      - name: 📝 Make ZRAM module | 制作 ZRAM 模块
        run: |
          set -e
          echo "📥 正在下载 zram.zip…"
          curl -L "https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/zram.zip" -o "$GITHUB_WORKSPACE/zram.zip"
          
          echo "📦 正在解压…"
          unzip -q "$GITHUB_WORKSPACE/zram.zip" -d "$GITHUB_WORKSPACE/zram"
          
          echo "🔁 正在替换 zram.ko…"
          find "$GITHUB_WORKSPACE/zram" -name "zram.ko" -exec cp "./kernel_workspace/common/out/drivers/block/zram/zram.ko" {} \;
          rm -rf $GITHUB_WORKSPACE/zram.zip
          
          echo "✅ 完成！"
          
      - name: 📤 Upload zram.zip | 上传 zram.zip
        uses: actions/upload-artifact@v7
        with:
          name: zram-module
          path: ./zram/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read
      
    steps:
      - name: Download ZIP Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.ak3name }}
          path: ./release_zips

      - name: Set Environment Variables
        run: |
          FULL_VERSION=${{ github.event.inputs.kernel_version }}-palaziks-ShiftPorts
          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
          export FULL_VERSION=$FULL_VERSION
          TIME="$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "TIME=$TIME" >> $GITHUB_ENV
          echo "TIME_FORM=$TIME_FORM" >> $GITHUB_ENV
          TAG_HEAD="OPPO-OPlus-Realme-build"
          echo "TAG_HEAD=$TAG_HEAD" >> $GITHUB_ENV
          KSU_TYPENAME="NON-ROOT"
          echo "KSU_TYPENAME=$KSU_TYPENAME" >> $GITHUB_ENV
          
      - name: Create Release
        if: inputs.github_release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > release_notes.md
          ### 📱 OnePlus 13 NON-ROOT SM8750 Generic Kernel | Build Info
          - **Kernel Version:** ${{ env.FULL_VERSION }}
          - **Build Time:** ${{ env.TIME_FORM }}
          - **Device:** Snapdragon 8 Elite Generic ${{ github.event.inputs.kernel_version }} Kernel (Based on OnePlus 13 ${{ github.event.inputs.kernel_version }} Official OKI source)
          - **KSU Branch:** NON-ROOT
          - **Baseband Guard Support:** ${{ github.event.inputs.baseband_guard }}
          - **Unicode Bypass Fix:** ${{ github.event.inputs.unicode_fix }}
          
          ### ⏫️ Update Notes:
          - Updated ${{ env.KSU_TYPENAME }} to the latest version (${{ needs.build.outputs.ksuver }})
          
          ### 📋 Installation Guide
          1. If you have a custom recovery (like TWRP) installed, you can flash the AnyKernel zip in recovery mode and reboot.
          2. If your phone is already rooted, you can install [HorizonKernelFlasher](https://github.com/libxzr/HorizonKernelFlasher/releases) and flash the AnyKernel zip through the app.
          3. If you have previously flashed a ReSukiSU kernel, you can flash the AnyKernel zip directly in the KSU Manager app.
          4. If you are flashing a kernel *without* the LZ4KD patch over a kernel that *has* it, please disable your ZRAM module first to avoid errors.
          5. Modern KSU managers require a metamodule to mount modules properly. Recommended metamodules include: [meta overlayfs](https://github.com/KernelSU-Modules-Repo/meta-overlayfs), [mountify](https://github.com/backslashxx/mountify), or [meta magicmount](https://github.com/7a72/meta-magic_mount/). If you are upgrading or using KSU for the first time, install one of these first.
          6. KernelPatch Next (KPN) is an independent KPM implementation. Do not use it if your kernel already has built-in KPM enabled.
          
          #### ※※※ Flashing custom kernels has risks. To prevent soft-bricks, always backup your boot/init_boot partitions using apps like [KernelFlasher](https://github.com/capntrips/KernelFlasher) before flashing! ※※※
          EOF

          gh release create "${{ env.TAG_HEAD }}-${{ env.TIME }}" \
            --repo "${{ github.repository }}" \
            --title "${{ env.TAG_HEAD }}-${{ env.FULL_VERSION }}" \
            --notes-file release_notes.md \
            release_zips/AnyKernel3_*.zip
